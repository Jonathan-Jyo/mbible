<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>성경절 JSON 변환기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: #1a1a2e;
    color: #f0f0f0;
    min-height: 100vh;
    padding: 24px 16px;
  }
  h1 { font-size: 20px; color: #c9a84c; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #a0a0b8; margin-bottom: 24px; }

  .section { margin-bottom: 20px; }
  label { display: block; font-size: 13px; color: #c9a84c; margin-bottom: 6px; font-weight: 600; }
  .hint { font-size: 12px; color: #a0a0b8; margin-bottom: 8px; line-height: 1.6; }

  textarea {
    width: 100%;
    background: #16213e;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 10px;
    color: #f0f0f0;
    font-family: inherit;
    font-size: 14px;
    padding: 12px;
    resize: vertical;
    outline: none;
    line-height: 1.7;
  }
  textarea:focus { border-color: #c9a84c; }

  .row { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; }
  select, input[type="text"] {
    background: #16213e;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 8px;
    color: #f0f0f0;
    font-family: inherit;
    font-size: 14px;
    padding: 8px 10px;
    outline: none;
  }
  select:focus, input[type="text"]:focus { border-color: #c9a84c; }

  .btn {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-primary { background: #c9a84c; color: #1a1a2e; }
  .btn-secondary { background: rgba(201,168,76,0.15); color: #c9a84c; border: 1px solid rgba(201,168,76,0.3); }

  .result-box {
    background: #0f3460;
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 10px;
    padding: 14px;
    font-size: 12px;
    font-family: monospace;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 300px;
    overflow-y: auto;
    display: none;
  }

  .count-badge {
    display: inline-block;
    background: rgba(201,168,76,0.15);
    color: #c9a84c;
    font-size: 12px;
    padding: 2px 10px;
    border-radius: 10px;
    margin-left: 8px;
  }

  .error { color: #e94560; font-size: 13px; margin-top: 6px; display: none; }

  .divider { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 20px 0; }

  .example-btn {
    font-size: 12px;
    color: #a0a0b8;
    background: none;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    font-family: inherit;
  }
  .example-btn:hover { color: #c9a84c; border-color: rgba(201,168,76,0.3); }

  /* 다국어 직접 입력 모드 */
  #multilang-section { margin-top: 8px; }
  .ml-form-card {
    background: #16213e;
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .lang-block {
    border-top: 1px solid rgba(255,255,255,0.07);
    padding-top: 12px;
    margin-top: 12px;
  }
  .lang-label {
    font-size: 13px;
    font-weight: 600;
    color: #c9a84c;
    margin-bottom: 8px;
  }
  .lang-req { color: #e94560; font-size: 11px; margin-left: 4px; }
  .lang-opt { color: #a0a0b8; font-size: 11px; margin-left: 4px; }
  .ml-ref-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .ml-ref-row input { flex: 1; }
  .ml-list-header {
    font-size: 13px; color: #c9a84c; font-weight: 600;
    margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
  }
  .ml-entry-card {
    background: #0f2a4a;
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .ml-entry-info { flex: 1; min-width: 0; }
  .ml-entry-topic { font-size: 14px; font-weight: 700; color: #f0f0f0; margin-bottom: 4px; }
  .ml-entry-ref { font-size: 12px; color: #c9a84c; margin-bottom: 2px; }
  .ml-entry-verse { font-size: 12px; color: #a0a0b8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ml-lang-tags { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
  .ml-lang-tag {
    font-size: 11px; background: rgba(201,168,76,0.12);
    color: #c9a84c; border-radius: 4px; padding: 1px 6px;
  }
  .ml-del-btn {
    background: rgba(233,69,96,0.12); border: 1px solid rgba(233,69,96,0.3);
    color: #e94560; border-radius: 6px; padding: 4px 10px; font-size: 12px;
    cursor: pointer; flex-shrink: 0; font-family: inherit;
  }
  .ml-del-btn:hover { background: rgba(233,69,96,0.25); }
  .ml-add-btn {
    background: rgba(201,168,76,0.15); color: #c9a84c;
    border: 1px solid rgba(201,168,76,0.3); border-radius: 8px;
    padding: 10px 20px; font-family: inherit; font-size: 14px;
    font-weight: 600; cursor: pointer; width: 100%; margin-top: 4px;
  }
  .ml-add-btn:hover { background: rgba(201,168,76,0.25); }
  .ml-empty { color: #a0a0b8; font-size: 13px; padding: 20px 0; text-align: center; }
</style>
</head>
<body>

<h1>성경절 JSON 변환기</h1>
<p class="subtitle">여러 성경절을 입력하면 "내성경절 가져오기"용 JSON 파일로 변환합니다.</p>

<div class="section">
  <label>입력 형식 선택</label>
  <div class="row">
    <select id="fmt" onchange="onFmtChange()">
      <option value="bethlehem" selected>베들레헴 형식</option>
      <option value="block">블록형 (주제 / 참조 / 구절)</option>
      <option value="pipe">한줄형 (주제|참조|구절)</option>
      <option value="multilang">다국어 직접 입력</option>
    </select>
    <button class="example-btn" onclick="loadExample()">예시 불러오기</button>
  </div>
</div>

<!-- 단일 언어 모드 -->
<div id="singlelang-section">
  <div class="section">
    <label>언어</label>
    <select id="lang">
      <option value="ko">한국어 (ko)</option>
      <option value="en">영어 (en)</option>
      <option value="ja">일본어 (ja)</option>
      <option value="zh">중국어 (zh)</option>
      <option value="in">인도네시아어 (in)</option>
    </select>
  </div>

  <div class="section">
    <label id="input-label">성경절 입력 <span class="count-badge" id="count">0개</span></label>
    <div class="hint" id="fmt-hint"></div>
    <textarea id="input" rows="12" placeholder="여기에 성경절을 입력하세요..."></textarea>
    <div class="error" id="error"></div>
  </div>

  <div class="row">
    <button class="btn btn-primary" onclick="convert()">JSON 변환 &amp; 다운로드</button>
    <button class="btn btn-secondary" onclick="preview()">미리보기</button>
  </div>
</div>

<!-- 다국어 직접 입력 모드 -->
<div id="multilang-section" style="display:none">
  <div class="hint" style="margin-bottom:12px">
    ▸ 한 성경절씩 5개 언어로 직접 입력한 뒤 <b>목록에 추가</b>하세요.<br>
    ▸ 한국어는 <b style="color:#e94560">필수</b>, 다른 언어는 선택입니다.<br>
    ▸ 다국어 입력 시 앱에서 병렬 보기로 확인할 수 있습니다.
  </div>

  <div class="ml-form-card">
    <div class="section" style="margin-bottom:12px">
      <label>주제 <span class="lang-opt">(미입력 시 "미분류")</span></label>
      <input type="text" id="ml-topic" placeholder="예: 믿음" style="width:100%">
    </div>

    <div class="lang-block">
      <div class="lang-label">🇰🇷 한국어 <span class="lang-req">*필수</span></div>
      <div class="ml-ref-row">
        <input type="text" id="ml-ko-ref" placeholder="참조 예: 히 11:1, 개역한글">
        <input type="text" id="ml-ko-title" placeholder="제목 (선택)">
      </div>
      <textarea id="ml-ko-verse" rows="3" placeholder="한국어 구절 내용을 입력하세요..."></textarea>
    </div>

    <div class="lang-block">
      <div class="lang-label">🇺🇸 영어 <span class="lang-opt">(선택)</span></div>
      <div class="ml-ref-row">
        <input type="text" id="ml-en-ref" placeholder="예: Hebrews 11:1, KJV">
        <input type="text" id="ml-en-title" placeholder="Title (optional)">
      </div>
      <textarea id="ml-en-verse" rows="3" placeholder="English verse..."></textarea>
    </div>

    <div class="lang-block">
      <div class="lang-label">🇯🇵 일본어 <span class="lang-opt">(선택)</span></div>
      <div class="ml-ref-row">
        <input type="text" id="ml-ja-ref" placeholder="例: ヘブル 11:1">
        <input type="text" id="ml-ja-title" placeholder="タイトル（任意）">
      </div>
      <textarea id="ml-ja-verse" rows="3" placeholder="日本語の聖句..."></textarea>
    </div>

    <div class="lang-block">
      <div class="lang-label">🇨🇳 중국어 <span class="lang-opt">(선택)</span></div>
      <div class="ml-ref-row">
        <input type="text" id="ml-zh-ref" placeholder="例: 希伯来书 11:1">
        <input type="text" id="ml-zh-title" placeholder="标题（可选）">
      </div>
      <textarea id="ml-zh-verse" rows="3" placeholder="中文经文..."></textarea>
    </div>

    <div class="lang-block">
      <div class="lang-label">🇮🇩 인도네시아어 <span class="lang-opt">(선택)</span></div>
      <div class="ml-ref-row">
        <input type="text" id="ml-in-ref" placeholder="Contoh: Ibrani 11:1, TB">
        <input type="text" id="ml-in-title" placeholder="Judul (opsional)">
      </div>
      <textarea id="ml-in-verse" rows="3" placeholder="Ayat dalam Bahasa Indonesia..."></textarea>
    </div>

    <button class="ml-add-btn" onclick="addMultilangEntry()">+ 목록에 추가</button>
  </div>

  <div id="ml-list-wrap">
    <div class="ml-list-header">
      추가된 성경절 <span class="count-badge" id="ml-count">0개</span>
    </div>
    <div id="ml-list"><div class="ml-empty">아직 추가된 성경절이 없습니다.</div></div>
  </div>

  <div class="row" style="margin-top:16px">
    <button class="btn btn-primary" onclick="downloadMultilang()">JSON 다운로드</button>
    <button class="btn btn-secondary" onclick="previewMultilang()">미리보기</button>
  </div>
  <div class="error" id="ml-error"></div>
</div>

<div class="section">
  <div class="result-box" id="result"></div>
</div>

<script>
  const inputEl   = document.getElementById('input');
  const fmtEl     = document.getElementById('fmt');
  const langEl    = document.getElementById('lang');

  // trailing 텍스트 → { topic, title } 분리
  // 구분자: 쉼표(,) — 베들레헴(따옴표 있음)·PRS Bible(따옴표 없음) 모두 동일
  function splitTrailing(trailing) {
    if (!trailing) return { topic: '', title: null };
    const ci = trailing.indexOf(',');
    if (ci > -1) {
      return {
        topic: trailing.substring(0, ci).trim(),
        title: trailing.substring(ci + 1).trim() || null
      };
    }
    return { topic: trailing, title: null };
  }
  const countEl   = document.getElementById('count');
  const errorEl   = document.getElementById('error');
  const resultEl  = document.getElementById('result');
  const hintEl    = document.getElementById('fmt-hint');

  inputEl.addEventListener('input', updateCount);

  function onFmtChange() {
    const isMultilang = fmtEl.value === 'multilang';
    document.getElementById('singlelang-section').style.display = isMultilang ? 'none' : '';
    document.getElementById('multilang-section').style.display  = isMultilang ? '' : 'none';
    resultEl.style.display = 'none';
    if (!isMultilang) updateHint();
  }

  function updateHint() {
    if (fmtEl.value === 'bethlehem') {
      hintEl.innerHTML = `
        <b>베들레헴 형식</b> — 따옴표 있음<br>
        <code>"구절"  (참조, 번역)  주제, 제목</code><br>
        예) <code>"예수께서 또 일러..."  (요 8:12, 개역한글)  참빛, 나는 세상의 빛이니</code><br>
        ※ 본문 안의 중첩 따옴표(<code>"Soul, you have..."</code>) 포함 구절도 지원<br>
        <b style="margin-top:6px;display:block">맥 베들레헴 형식</b> — 대괄호 언어레이블<br>
        <code>[언어레이블]  구절  (참조)  주제, 제목</code><br>
        예) <code>[개역한글]  내가 내 영혼에게 이르되...  (눅 12:19)  자만, 많이 쌓아 두었으니</code><br>
        <b style="margin-top:6px;display:block">PRS Bible 형식</b> — 따옴표 없음<br>
        <code>구절  (참조, TBI)  주제, 제목</code><br>
        예) <code>Iman adalah dasar...  (Ibrani 11:1, TBI)  Iman, Dasar Iman</code><br>
        ▸ 쉼표 앞 = 과 주제, 쉼표 뒤 = 제목 · 한 줄에 하나씩 붙여넣기 가능`;
    } else if (fmtEl.value === 'block') {
      hintEl.innerHTML = `▸ 각 성경절을 아래 형식으로 입력하고 <b>빈 줄로 구분</b>:<br>
        <code>주제: 믿음</code><br>
        <code>참조: 히 11:1</code><br>
        <code>구절: 믿음은 바라는 것들의 실상이요...</code>`;
    } else {
      hintEl.innerHTML = `▸ 한 줄에 하나씩, <b>파이프(|)로 구분</b>:<br>
        <code>믿음 | 히 11:1 | 믿음은 바라는 것들의 실상이요...</code>`;
    }
    updateCount();
  }

  function updateCount() {
    try {
      const parsed = parse();
      countEl.textContent = parsed.length + '개';
    } catch(e) {
      countEl.textContent = '0개';
    }
  }

  // ── 다국어 직접 입력 ──────────────────────────────────────
  let mlEntries = [];

  function addMultilangEntry() {
    const topic   = document.getElementById('ml-topic').value.trim() || '미분류';
    const koVerse = document.getElementById('ml-ko-verse').value.trim();
    const koRef   = document.getElementById('ml-ko-ref').value.trim();
    const mlErr   = document.getElementById('ml-error');

    mlErr.style.display = 'none';
    if (!koVerse) {
      mlErr.textContent = '⚠ 한국어 구절을 입력해 주세요.';
      mlErr.style.display = 'block';
      return;
    }

    const verses = { ko: koVerse };
    const refs   = { ko: koRef };
    const titles = {};
    const koTitle = document.getElementById('ml-ko-title').value.trim();
    if (koTitle) titles.ko = koTitle;

    const langCodes = ['en', 'ja', 'zh', 'in'];
    for (const lc of langCodes) {
      const v = document.getElementById(`ml-${lc}-verse`).value.trim();
      const r = document.getElementById(`ml-${lc}-ref`).value.trim();
      const t = document.getElementById(`ml-${lc}-title`).value.trim();
      if (v) { verses[lc] = v; refs[lc] = r || koRef; }
      if (t) titles[lc] = t;
    }

    const now = Date.now();
    mlEntries.push({
      id:        `uv-${now}-${Math.random().toString(36).slice(2,6)}`,
      topic,
      lang:      'ko',
      reference: koRef,
      verse:     koVerse,
      verses,
      refs,
      titles:    Object.keys(titles).length ? titles : null,
      multilang: true,
      hasAudio:  false,
      createdAt: now,
      updatedAt: now
    });

    renderMlList();
    clearMlForm();
  }

  function clearMlForm() {
    ['ml-topic',
     'ml-ko-ref','ml-ko-title','ml-ko-verse',
     'ml-en-ref','ml-en-title','ml-en-verse',
     'ml-ja-ref','ml-ja-title','ml-ja-verse',
     'ml-zh-ref','ml-zh-title','ml-zh-verse',
     'ml-in-ref','ml-in-title','ml-in-verse']
      .forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
    document.getElementById('ml-topic').focus();
  }

  function deleteMlEntry(idx) {
    mlEntries.splice(idx, 1);
    renderMlList();
  }

  function renderMlList() {
    const listEl   = document.getElementById('ml-list');
    const countEl2 = document.getElementById('ml-count');
    countEl2.textContent = mlEntries.length + '개';
    resultEl.style.display = 'none';

    if (!mlEntries.length) {
      listEl.innerHTML = '<div class="ml-empty">아직 추가된 성경절이 없습니다.</div>';
      return;
    }

    listEl.innerHTML = mlEntries.map((e, i) => {
      const langs = Object.keys(e.verses).filter(l => e.verses[l]);
      const tags  = langs.map(l => `<span class="ml-lang-tag">${l}</span>`).join('');
      const preview = e.verse.length > 50 ? e.verse.slice(0, 50) + '…' : e.verse;
      return `
        <div class="ml-entry-card">
          <div class="ml-entry-info">
            <div class="ml-entry-topic">${e.topic}</div>
            <div class="ml-entry-ref">${e.refs.ko || ''}</div>
            <div class="ml-entry-verse">${preview}</div>
            <div class="ml-lang-tags">${tags}</div>
          </div>
          <button class="ml-del-btn" onclick="deleteMlEntry(${i})">삭제</button>
        </div>`;
    }).join('');
  }

  function previewMultilang() {
    const mlErr = document.getElementById('ml-error');
    mlErr.style.display = 'none';
    if (!mlEntries.length) {
      mlErr.textContent = '⚠ 추가된 성경절이 없습니다.';
      mlErr.style.display = 'block';
      return;
    }
    resultEl.textContent = JSON.stringify(mlEntries, null, 2);
    resultEl.style.display = 'block';
  }

  function downloadMultilang() {
    const mlErr = document.getElementById('ml-error');
    mlErr.style.display = 'none';
    if (!mlEntries.length) {
      mlErr.textContent = '⚠ 추가된 성경절이 없습니다.';
      mlErr.style.display = 'block';
      return;
    }
    const blob = new Blob([JSON.stringify(mlEntries, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    const d    = new Date();
    const date = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    a.download = `내성경절_다국어_${date}.json`;
    a.click();
    URL.revokeObjectURL(url);
    resultEl.textContent = `✓ ${mlEntries.length}개 다국어 성경절 → ${a.download} 저장됨\n\n` + JSON.stringify(mlEntries, null, 2);
    resultEl.style.display = 'block';
  }

  function parse() {
    const text = inputEl.value.trim();
    if (!text) return [];
    if (fmtEl.value === 'bethlehem') {
      return text.split('\n')
        .map(l => l.trim()).filter(l => l && !l.startsWith('#'))
        .map((line, i) => {
          // 큰따옴표 정규화 (\u201c\u201d → ")
          const normalized = line.replace(/[\u201c\u201d]/g, '"');
          // 형식 A (맥 베들레헴): [언어레이블] 구절 (참조) 주제[, 제목]
          // ← [...]로 시작하는 줄, 참조 안에 쉼표 없음
          const mA = normalized.startsWith('[')
            ? normalized.match(/^\[[^\]]+\]\s+(.+)\s+\(([^)]+)\)\s+(.+)$/)
            : null;
          // 형식 B (베들레헴): "구절" (참조, 번역) 주제[, 제목]
          // ← .+ 탐욕적 매칭으로 내부 따옴표("...") 포함 구절 지원
          const mB = (!mA && normalized.startsWith('"'))
            ? normalized.match(/^"(.+)"\s+\(([^)]+)\)\s+(.+)$/)
            : null;
          // 형식 C (PRS Bible): 구절 (참조, 코드) 주제[, 제목]  ← 따옴표·대괄호 없음
          const mC = (!mA && !mB)
            ? normalized.match(/^(.+?)\s+\(([^)]+)\)\s+(.+)$/)
            : null;
          const m = mA || mB || mC;
          if (!m) throw new Error(`${i+1}번째 줄: 인식할 수 없는 형식입니다.`);
          const { topic, title } = splitTrailing(m[3].trim());
          return {
            verse:     m[1].trim(),
            reference: m[2].trim(),
            topic,
            title
          };
        });
    } else if (fmtEl.value === 'pipe') {
      return text.split('\n')
        .map(l => l.trim()).filter(l => l && !l.startsWith('#'))
        .map((line, i) => {
          const parts = line.split('|').map(s => s.trim());
          if (parts.length < 3) throw new Error(`${i+1}번째 줄: 파이프(|) 3개로 구분해주세요.`);
          return { topic: parts[0], reference: parts[1], verse: parts[2] };
        });
    } else {
      const blocks = text.split(/\n\s*\n/).map(b => b.trim()).filter(Boolean);
      return blocks.map((block, bi) => {
        const obj = {};
        block.split('\n').forEach(line => {
          const m = line.match(/^(주제|참조|구절)\s*[:：]\s*(.+)/);
          if (m) obj[m[1]] = m[2].trim();
        });
        if (!obj['구절']) throw new Error(`${bi+1}번째 블록에 '구절:' 항목이 없습니다.`);
        return { topic: obj['주제'] || '', reference: obj['참조'] || '', verse: obj['구절'] };
      });
    }
  }

  function buildJSON(items) {
    const lang = langEl.value;
    const now  = Date.now();
    return items.map((item, i) => ({
      id:        `uv-${now + i}-${Math.random().toString(36).slice(2,6)}`,
      topic:     item.topic,
      lang:      lang,
      reference: item.reference,
      verse:     item.verse,
      multilang: false,
      verses:    null,
      refs:      null,
      titles:    item.title ? { [lang]: item.title } : null,
      hasAudio:  false,
      createdAt: now + i,
      updatedAt: now + i
    }));
  }

  function showError(msg) {
    errorEl.textContent = '⚠ ' + msg;
    errorEl.style.display = 'block';
  }
  function clearError() { errorEl.style.display = 'none'; }

  function preview() {
    clearError();
    resultEl.style.display = 'none';
    try {
      const items = parse();
      if (!items.length) { showError('입력된 성경절이 없습니다.'); return; }
      const json = buildJSON(items);
      resultEl.textContent = JSON.stringify(json, null, 2);
      resultEl.style.display = 'block';
    } catch(e) {
      showError(e.message);
    }
  }

  function convert() {
    clearError();
    resultEl.style.display = 'none';
    try {
      const items = parse();
      if (!items.length) { showError('입력된 성경절이 없습니다.'); return; }
      const json = buildJSON(items);
      const blob = new Blob([JSON.stringify(json, null, 2)], { type: 'application/json' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      const d    = new Date();
      const date = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      a.download = `내성경절_${date}.json`;
      a.click();
      URL.revokeObjectURL(url);
      resultEl.textContent = `✓ ${json.length}개 성경절 → ${a.download} 저장됨\n\n` + JSON.stringify(json, null, 2);
      resultEl.style.display = 'block';
    } catch(e) {
      showError(e.message);
    }
  }

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>성경 읽기</title>
<style>
  /* ── 다크(기본) ── */
  :root {
    --bg: #14141f; --bg2: #1c1c30; --card: #12233d;
    --gold: #c9a84c; --blue: #5b9bd5;
    --text: #eef0f5; --dim: #9096ad; --line: rgba(255,255,255,0.07);
    --sel: rgba(201,168,76,0.24);
    --read-font: 17px; --read-lh: 2.0;
  }
  /* ── 라이트 ── */
  :root[data-theme="light"] {
    --bg: #f6f4ec; --bg2: #fffdf6; --card: #efe9da;
    --gold: #a9852f; --blue: #3a72b0;
    --text: #22242b; --dim: #6b7080; --line: rgba(0,0,0,0.09);
    --sel: rgba(201,168,76,0.2);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column; height: 100dvh; overflow: hidden;
  }

  /* ── 상단 바 ── */
  header {
    flex-shrink: 0; background: var(--bg2); border-bottom: 1px solid var(--line);
    padding: 9px 12px; display: flex; align-items: center; gap: 8px;
  }
  .chip {
    border: 1px solid rgba(201,168,76,0.35); background: rgba(201,168,76,0.1);
    color: var(--gold); font-family: inherit; font-size: 14px; font-weight: 700;
    padding: 7px 14px; border-radius: 999px; cursor: pointer; white-space: nowrap;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .chip:active { background: rgba(201,168,76,0.22); }
  .chip .caret { font-size: 9px; opacity: 0.7; }
  #chip-loc { flex: 1; min-width: 0; justify-content: flex-start; overflow: hidden; }
  #chip-loc .loc-t { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .icon-chip {
    flex-shrink: 0; width: 38px; height: 38px; border-radius: 50%;
    border: 1px solid var(--line); background: var(--card); color: var(--text);
    font-size: 17px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
  }
  .app-link { flex-shrink: 0; font-size: 12px; color: var(--dim); text-decoration: none; border: 1px solid var(--line); border-radius: 999px; padding: 7px 11px; }

  /* ── 읽기 영역 ── */
  main { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 18px 18px 96px; }
  .chapter-head {
    text-align: center; color: var(--gold); font-size: 15px; font-weight: 700;
    margin: 2px 0 18px; letter-spacing: 0.5px; padding-bottom: 12px; border-bottom: 1px solid var(--line);
  }
  .verse {
    display: block; line-height: var(--read-lh); font-size: var(--read-font);
    padding: 2px 6px; border-radius: 8px; cursor: pointer; margin-bottom: 1px; transition: background 0.12s;
  }
  .verse:active { background: rgba(127,127,127,0.12); }
  .verse.sel { background: var(--sel); }
  .verse.in-range { background: rgba(201,168,76,0.13); }
  .vnum { color: var(--gold); font-size: 0.62em; font-weight: 700; vertical-align: super; margin-right: 6px; user-select: none; opacity: 0.85; }
  .loading, .reader-msg { text-align: center; color: var(--dim); padding: 44px 20px; font-size: 14px; line-height: 1.7; }

  /* ── 하단 장 이동 ── */
  .foot { position: fixed; left: 0; right: 0; bottom: 0; z-index: 10; display: flex; gap: 8px; padding: 10px 12px calc(10px + env(safe-area-inset-bottom)); background: linear-gradient(180deg, transparent, var(--bg) 32%); }
  .foot-btn { flex: 1; background: var(--bg2); border: 1px solid var(--line); color: var(--text); font-family: inherit; font-size: 14px; font-weight: 600; padding: 12px; border-radius: 10px; cursor: pointer; }
  .foot-btn:active { background: var(--card); }
  .foot-btn:disabled { opacity: 0.35; }

  /* ── 선택 액션 바 ── */
  .action-bar { position: fixed; left: 12px; right: 12px; bottom: calc(70px + env(safe-area-inset-bottom)); z-index: 20; background: var(--card); border: 1px solid var(--gold); border-radius: 12px; padding: 10px 12px; display: none; align-items: center; gap: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  .action-bar.show { display: flex; }
  .ab-ref { flex: 1; font-weight: 700; color: var(--gold); font-size: 14px; }
  .ab-btn { border: none; border-radius: 8px; font-family: inherit; font-size: 13px; font-weight: 600; padding: 8px 14px; cursor: pointer; }
  .ab-add { background: var(--gold); color: var(--bg2); }
  .ab-clear { background: rgba(127,127,127,0.18); color: var(--text); }

  /* ── 오버레이/시트 ── */
  .overlay { position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,0.55); display: none; align-items: flex-end; justify-content: center; }
  .overlay.show { display: flex; }
  .sheet { width: 100%; max-width: 560px; max-height: 90dvh; background: var(--bg2); border: 1px solid var(--line); border-bottom: none; border-radius: 16px 16px 0 0; display: flex; flex-direction: column; animation: slideup 0.22s ease; }
  @keyframes slideup { from { transform: translateY(28px); opacity: 0.5; } to { transform: none; opacity: 1; } }
  .sheet-head { flex-shrink: 0; display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-bottom: 1px solid var(--line); }
  .sheet-title { flex: 1; font-size: 15px; font-weight: 700; color: var(--gold); }
  .sheet-x { background: none; border: none; color: var(--dim); font-size: 20px; cursor: pointer; padding: 0 4px; }
  .sheet-body { overflow-y: auto; -webkit-overflow-scrolling: touch; }

  .seg { display: inline-flex; background: var(--card); border-radius: 999px; padding: 2px; }
  .seg button { border: none; background: none; color: var(--dim); font-family: inherit; font-size: 12px; font-weight: 600; padding: 6px 13px; border-radius: 999px; cursor: pointer; }
  .seg button.on { background: var(--gold); color: var(--bg2); }

  /* ── 설정 ── */
  .set-row { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--line); }
  .set-label { flex: 1; font-size: 14px; }
  .stepper { display: inline-flex; align-items: center; gap: 2px; }
  .stepper button { width: 34px; height: 34px; border: 1px solid var(--line); background: var(--card); color: var(--text); font-size: 18px; border-radius: 8px; cursor: pointer; }
  .stepper .val { min-width: 46px; text-align: center; font-size: 14px; font-weight: 600; }
  .set-btn { display: block; width: calc(100% - 32px); margin: 14px 16px; padding: 13px; text-align: center; border: 1px solid rgba(201,168,76,0.4); border-radius: 10px; background: rgba(201,168,76,0.08); color: var(--gold); font-size: 14px; font-weight: 600; cursor: pointer; }

  /* ── 성경절 찾아가기 ── */
  .goto-toprow { flex-shrink: 0; display: flex; align-items: center; gap: 8px; padding: 12px 16px 8px; flex-wrap: wrap; }
  .goto-select { flex: 1; min-width: 130px; background: var(--card); border: 1px solid rgba(201,168,76,0.28); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 13px; padding: 8px 10px; -webkit-appearance: none; appearance: none; }
  .goto-input-row { flex-shrink: 0; display: flex; gap: 8px; padding: 4px 16px 12px; border-bottom: 1px solid var(--line); }
  .goto-input-row input { flex: 1; background: var(--card); border: 1px solid rgba(201,168,76,0.25); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 14px; padding: 9px 12px; outline: none; }
  .goto-input-row input:focus { border-color: var(--gold); }
  .goto-go { border: none; background: var(--card); color: var(--gold); border: 1px solid rgba(201,168,76,0.35); font-weight: 700; border-radius: 8px; padding: 0 16px; font-size: 14px; cursor: pointer; font-family: inherit; }
  .goto-cols { flex: 1; display: grid; grid-template-columns: 1.5fr 1fr; overflow: hidden; min-height: 220px; }
  .goto-col { overflow-y: auto; -webkit-overflow-scrolling: touch; border-right: 1px solid var(--line); }
  .goto-col:last-child { border-right: none; }
  .goto-item { padding: 11px 14px; font-size: 14px; cursor: pointer; border-bottom: 1px solid rgba(127,127,127,0.08); display: flex; align-items: center; gap: 7px; }
  .goto-item:active { background: rgba(127,127,127,0.12); }
  .goto-item.on { background: var(--sel); color: var(--gold); font-weight: 700; }
  .goto-item .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .goto-item .dot.ot { background: var(--gold); }
  .goto-item .dot.nt { background: var(--blue); }
  .goto-num { justify-content: center; padding: 11px 6px; }
  .goto-verse-row { flex-shrink: 0; display: flex; align-items: center; gap: 10px; padding: 12px 16px calc(12px + env(safe-area-inset-bottom)); border-top: 1px solid var(--line); background: var(--bg2); }
  .goto-verse-row .gv-label { font-size: 13px; color: var(--dim); }
  .goto-verse-row .gv-sel { flex: 1; font-size: 13px; color: var(--gold); font-weight: 700; }
  .goto-verse-row input { width: 70px; background: var(--card); border: 1px solid rgba(201,168,76,0.3); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 15px; text-align: center; padding: 9px; outline: none; }
  .goto-verse-row input:focus { border-color: var(--gold); }
  .goto-verse-row .gv-go { border: none; background: var(--gold); color: var(--bg2); font-weight: 700; border-radius: 8px; padding: 10px 18px; font-size: 14px; cursor: pointer; font-family: inherit; }

  /* ── 역본(DB 관리) 패널 ── */
  .ver-item { display: flex; align-items: center; gap: 10px; padding: 13px 16px; border-bottom: 1px solid var(--line); cursor: pointer; font-size: 15px; }
  .ver-item:active { background: rgba(127,127,127,0.12); }
  .ver-item.on { background: var(--sel); }
  .vdiamond { font-size: 12px; }
  .vdiamond.bundle { color: var(--gold); }
  .vdiamond.user { color: var(--blue); }
  .ver-item .vlabel { flex: 1; }
  .ver-item .vdel { background: rgba(127,127,127,0.16); color: var(--dim); border: none; border-radius: 7px; font-size: 12px; padding: 5px 10px; cursor: pointer; }
  .ver-load { margin: 12px 16px; padding: 13px; text-align: center; border: 1px dashed rgba(91,155,213,0.55); border-radius: 10px; color: var(--blue); font-size: 13px; cursor: pointer; background: rgba(91,155,213,0.07); }
  .ver-section { padding: 10px 16px 4px; font-size: 11px; font-weight: 700; color: var(--dim); letter-spacing: 0.5px; }

  /* ── 역본대조 ── */
  .pverse { display: flex; gap: 10px; padding: 8px 6px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; border-bottom: 1px solid var(--line); }
  .pverse:active { background: rgba(127,127,127,0.1); }
  .pverse.sel { background: var(--sel); }
  .pverse.in-range { background: rgba(201,168,76,0.13); }
  .pvnum { flex-shrink: 0; color: var(--gold); font-size: 13px; font-weight: 700; min-width: 22px; text-align: right; padding-top: 2px; }
  .pv-lines { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 6px; }
  .pv-line { font-size: calc(var(--read-font) - 1px); line-height: 1.6; }
  .pv-label { color: var(--blue); font-size: 11px; font-weight: 700; margin-right: 5px; }
  :root[data-theme="light"] .pv-label { color: #2f6bb0; }

  /* ── 토글 스위치 ── */
  .switch { position: relative; display: inline-block; width: 46px; height: 26px; flex-shrink: 0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch .slider { position: absolute; cursor: pointer; inset: 0; background: var(--card); border: 1px solid var(--line); border-radius: 999px; transition: 0.2s; }
  .switch .slider:before { content: ""; position: absolute; width: 20px; height: 20px; left: 2px; top: 2px; background: var(--dim); border-radius: 50%; transition: 0.2s; }
  .switch input:checked + .slider { background: rgba(201,168,76,0.3); border-color: var(--gold); }
  .switch input:checked + .slider:before { transform: translateX(20px); background: var(--gold); }

  /* ── 대조 역본 체크 리스트 ── */
  .par-item { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--line); cursor: pointer; font-size: 15px; }
  .par-item:active { background: rgba(127,127,127,0.1); }
  .par-check { width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--line); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; color: var(--bg2); }
  .par-item.on .par-check { background: var(--gold); border-color: var(--gold); }
  .par-diamond { font-size: 11px; }
  .par-diamond.bundle { color: var(--gold); }
  .par-diamond.user { color: var(--blue); }

  /* ── 성구 검색 결과 ── */
  .search-sum { padding: 12px 16px; font-size: 14px; color: var(--text); border-bottom: 1px solid var(--line); background: var(--card); position: sticky; top: 0; z-index: 1; }
  .search-sum b { color: var(--gold); }
  .search-item { padding: 12px 16px; border-bottom: 1px solid var(--line); cursor: pointer; }
  .search-item:active { background: rgba(127,127,127,0.1); }
  .si-ref { display: inline-block; color: var(--gold); font-weight: 700; font-size: 13px; margin-bottom: 3px; }
  .si-text { display: block; font-size: var(--read-font); line-height: 1.7; color: var(--text); }
  .si-text mark { background: transparent; color: #e0533f; font-weight: 700; padding: 0; }
  :root[data-theme="light"] .si-text mark { color: #c0271a; }
  .search-back { padding: 11px 16px; color: var(--blue); font-size: 13px; font-weight: 600; cursor: pointer; border-bottom: 1px solid var(--line); background: var(--bg2); position: sticky; top: 0; z-index: 2; }
  .search-back:active { background: var(--card); }
  /* 최근 검색 이력 */
  .hist-item { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid var(--line); }
  .hist-info { flex: 1; min-width: 0; }
  .hist-term { font-weight: 600; font-size: 15px; }
  .hist-meta { display: block; font-size: 11px; color: var(--dim); margin-top: 2px; }
  .hist-btn { border: none; border-radius: 7px; font-size: 12px; font-weight: 600; padding: 7px 13px; cursor: pointer; font-family: inherit; flex-shrink: 0; }
  .hist-btn.view { background: rgba(201,168,76,0.16); color: var(--gold); }
  .hist-btn.del { background: rgba(127,127,127,0.16); color: var(--dim); }

  /* ── 기억절 추가 모달 ── */
  .modal-overlay { position: fixed; inset: 0; z-index: 60; background: rgba(0,0,0,0.72); display: none; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.show { display: flex; }
  .modal { width: 100%; max-width: 440px; background: var(--bg2); border: 1px solid var(--line); border-radius: 14px; padding: 18px; }
  .modal h3 { font-size: 16px; color: var(--gold); margin-bottom: 4px; }
  .modal .m-ref { font-size: 13px; color: var(--dim); margin-bottom: 14px; }
  .modal label { display: block; font-size: 12px; color: var(--gold); margin: 10px 0 5px; font-weight: 600; }
  .modal input[type=text] { width: 100%; background: var(--card); border: 1px solid rgba(201,168,76,0.25); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 14px; padding: 10px; }
  .m-preview { background: var(--card); border-radius: 8px; padding: 10px; margin-top: 10px; font-size: 13px; line-height: 1.7; max-height: 160px; overflow-y: auto; }
  .m-preview .mp-lang { color: var(--gold); font-size: 11px; font-weight: 700; margin-right: 6px; }
  .m-actions { display: flex; gap: 8px; margin-top: 16px; }
  .m-actions button { flex: 1; border: none; border-radius: 10px; font-family: inherit; font-size: 14px; font-weight: 600; padding: 12px; cursor: pointer; }
  .m-cancel { background: rgba(127,127,127,0.18); color: var(--text); }
  .m-save { background: var(--gold); color: var(--bg2); }
  .m-save:disabled { opacity: 0.5; }

  .toast { position: fixed; left: 50%; bottom: 140px; transform: translateX(-50%); background: rgba(0,0,0,0.88); color: #fff; font-size: 13px; padding: 10px 18px; border-radius: 999px; z-index: 70; opacity: 0; transition: opacity 0.25s; pointer-events: none; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <button class="chip" id="chip-loc" onclick="openGoto()"><span class="loc-t" id="loc-text">요 1:1</span><span class="caret">▼</span></button>
  <button class="icon-chip" id="chip-par" onclick="openParallelPanel()" title="역본대조">⇄</button>
  <button class="icon-chip" onclick="openSearch()" title="성구 검색">🔍</button>
  <button class="icon-chip" onclick="openSettings()" title="설정">⚙</button>
  <a class="app-link" href="index.html">✝ 암송</a>
</header>

<main id="reader"><div class="loading">불러오는 중…</div></main>

<div class="action-bar" id="action-bar">
  <span class="ab-ref" id="ab-ref"></span>
  <button class="ab-btn ab-clear" onclick="clearSel()">해제</button>
  <button class="ab-btn ab-add" onclick="openAddModal()">★ 기억절 추가</button>
</div>

<div class="foot">
  <button class="foot-btn" id="btn-prev" onclick="goPrev()">◀ 이전 장</button>
  <button class="foot-btn" id="btn-next" onclick="goNext()">다음 장 ▶</button>
</div>

<!-- 성경절 찾아가기: 역본 → 구약/신약 → 책 → 장 → 절(숫자) -->
<div class="overlay" id="goto-overlay">
  <div class="sheet" style="height:90dvh">
    <div class="sheet-head">
      <span class="sheet-title">성경절 찾아가기</span>
      <button class="sheet-x" onclick="closeGoto()">✕</button>
    </div>
    <div class="goto-toprow">
      <select class="goto-select" id="goto-version" onchange="onGotoVersionChange(this.value)"></select>
      <div class="seg" id="goto-testament">
        <button data-t="all" class="on" onclick="setTestament('all')">전체</button>
        <button data-t="ot" onclick="setTestament('ot')">구약</button>
        <button data-t="nt" onclick="setTestament('nt')">신약</button>
      </div>
    </div>
    <div class="goto-input-row">
      <input type="text" id="goto-input" placeholder="직접 입력: 요3:16 · 3:16 · 16 · 창5" autocomplete="off"
        onkeydown="if(event.key==='Enter')applyGotoInput()">
      <button class="goto-go" onclick="applyGotoInput()">확인</button>
    </div>
    <div class="goto-cols">
      <div class="goto-col" id="goto-books"></div>
      <div class="goto-col goto-num" id="goto-chapters"></div>
    </div>
    <div class="goto-verse-row">
      <span class="gv-sel" id="gv-sel">책·장을 선택하세요</span>
      <span class="gv-label">절</span>
      <input type="number" id="gv-input" min="1" placeholder="1" inputmode="numeric"
        onkeydown="if(event.key==='Enter')applyVerseGo()">
      <button class="gv-go" onclick="applyVerseGo()">이동</button>
    </div>
  </div>
</div>

<!-- 성구 검색 -->
<div class="overlay" id="search-overlay">
  <div class="sheet" style="height:90dvh">
    <div class="sheet-head">
      <span class="sheet-title">성구 검색</span>
      <button class="sheet-x" onclick="closeSearch()">✕</button>
    </div>
    <div class="goto-toprow">
      <select class="goto-select" id="search-version"></select>
      <div class="seg" id="search-scope">
        <button data-t="all" class="on" onclick="setSearchScope('all')">전체</button>
        <button data-t="ot" onclick="setSearchScope('ot')">구약</button>
        <button data-t="nt" onclick="setSearchScope('nt')">신약</button>
      </div>
    </div>
    <div class="goto-input-row">
      <input type="text" id="search-input" placeholder="찾을 말 (여러 낱말은 띄어쓰기 = 모두 포함)" autocomplete="off"
        onkeydown="if(event.key==='Enter')runSearch()">
      <button class="goto-go" id="search-go" onclick="runSearch()">검색</button>
    </div>
    <div class="sheet-body" id="search-results" style="flex:1">
      <div class="reader-msg" style="font-size:13px">찾을 말을 입력하고 [검색]을 누르세요.</div>
    </div>
  </div>
</div>

<!-- 역본대조 설정 -->
<div class="overlay" id="par-overlay">
  <div class="sheet" style="max-height:84dvh">
    <div class="sheet-head">
      <span class="sheet-title">역본대조</span>
      <button class="sheet-x" onclick="closeParallelPanel()">✕</button>
    </div>
    <div class="set-row">
      <span class="set-label">역본대조 보기</span>
      <label class="switch"><input type="checkbox" id="par-on" onchange="toggleParallel(this.checked)"><span class="slider"></span></label>
    </div>
    <div class="set-row">
      <span class="set-label">역본명 표시</span>
      <label class="switch"><input type="checkbox" id="par-labels" onchange="toggleParLabels(this.checked)"><span class="slider"></span></label>
    </div>
    <div class="ver-section">대조할 역본 선택 (위에서부터 순서대로 표시)</div>
    <div class="sheet-body" id="par-list"></div>
  </div>
</div>

<!-- 설정 -->
<div class="overlay" id="set-overlay">
  <div class="sheet" style="max-height:82dvh">
    <div class="sheet-head">
      <span class="sheet-title">설정</span>
      <button class="sheet-x" onclick="closeSettings()">✕</button>
    </div>
    <div class="sheet-body">
      <div class="set-row">
        <span class="set-label">화면 모드</span>
        <div class="seg" id="set-theme">
          <button data-m="light" onclick="setTheme('light')">라이트</button>
          <button data-m="dark" onclick="setTheme('dark')">다크</button>
          <button data-m="system" onclick="setTheme('system')">시스템</button>
        </div>
      </div>
      <div class="set-row">
        <span class="set-label">본문 글자 크기</span>
        <div class="stepper">
          <button onclick="adjFont(-1)">−</button>
          <span class="val" id="val-font">17</span>
          <button onclick="adjFont(1)">＋</button>
        </div>
      </div>
      <div class="set-row">
        <span class="set-label">본문 줄 간격</span>
        <div class="stepper">
          <button onclick="adjLh(-1)">−</button>
          <span class="val" id="val-lh">2.0</span>
          <button onclick="adjLh(1)">＋</button>
        </div>
      </div>
      <button class="set-btn" onclick="closeSettings();openVersionPanel()">📚 성경 DB 관리 (역본 불러오기·삭제)</button>
    </div>
  </div>
</div>

<!-- 성경 DB 관리(역본) 패널 -->
<div class="overlay" id="ver-overlay">
  <div class="sheet" style="max-height:82dvh">
    <div class="sheet-head">
      <span class="sheet-title">성경 DB 관리</span>
      <button class="sheet-x" onclick="closeVersionPanel()">✕</button>
    </div>
    <div class="sheet-body" id="ver-list"></div>
    <div class="ver-load" onclick="document.getElementById('bdb-file').click()">＋ 내 .bdb 역본 불러오기</div>
    <input type="file" id="bdb-file" accept=".bdb,.sdb" hidden>
  </div>
</div>

<!-- 기억절 추가 -->

  <div class="modal">
    <h3>기억절로 추가</h3>
    <div class="m-ref" id="m-ref"></div>
    <label>주제</label>
    <input type="text" id="m-topic" placeholder="예) 믿음, 사랑, 구원…" autocomplete="off">
    <div class="m-preview" id="m-preview"></div>
    <div class="m-actions">
      <button class="m-cancel" onclick="closeAddModal()">취소</button>
      <button class="m-save" id="m-save" onclick="saveVerse()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="lib/sqljs/sql-wasm.js"></script>
<script src="js/bdb-store.js?v=1"></script>
<script src="js/bible-db.js?v=2"></script>
<script src="js/user-verses.js?v=2"></script>
<script>
// ═══════════════════════════════════════════
// 상수
// ═══════════════════════════════════════════
const BOOKS = [
  ["GEN","창세기"],["EXO","출애굽기"],["LEV","레위기"],["NUM","민수기"],["DEU","신명기"],
  ["JOS","여호수아"],["JDG","사사기"],["RUT","룻기"],["1SA","사무엘상"],["2SA","사무엘하"],
  ["1KI","열왕기상"],["2KI","열왕기하"],["1CH","역대상"],["2CH","역대하"],["EZR","에스라"],
  ["NEH","느헤미야"],["EST","에스더"],["JOB","욥기"],["PSA","시편"],["PRO","잠언"],
  ["ECC","전도서"],["SNG","아가"],["ISA","이사야"],["JER","예레미야"],["LAM","예레미야애가"],
  ["EZK","에스겔"],["DAN","다니엘"],["HOS","호세아"],["JOL","요엘"],["AMO","아모스"],
  ["OBA","오바댜"],["JON","요나"],["MIC","미가"],["NAM","나훔"],["HAB","하박국"],
  ["ZEP","스바냐"],["HAG","학개"],["ZEC","스가랴"],["MAL","말라기"],
  ["MAT","마태복음"],["MRK","마가복음"],["LUK","누가복음"],["JHN","요한복음"],["ACT","사도행전"],
  ["ROM","로마서"],["1CO","고린도전서"],["2CO","고린도후서"],["GAL","갈라디아서"],["EPH","에베소서"],
  ["PHP","빌립보서"],["COL","골로새서"],["1TH","데살로니가전서"],["2TH","데살로니가후서"],
  ["1TI","디모데전서"],["2TI","디모데후서"],["TIT","디도서"],["PHM","빌레몬서"],["HEB","히브리서"],
  ["JAS","야고보서"],["1PE","베드로전서"],["2PE","베드로후서"],["1JN","요한일서"],["2JN","요한이서"],
  ["3JN","요한삼서"],["JUD","유다서"],["REV","요한계시록"]
];
const OT_COUNT = 39;
const KO_ABBR = {'창':0,'출':1,'레':2,'민':3,'신':4,'수':5,'삿':6,'룻':7,'삼상':8,'삼하':9,'왕상':10,'왕하':11,'대상':12,'대하':13,'스':14,'느':15,'에':16,'욥':17,'시':18,'잠':19,'전':20,'아':21,'사':22,'렘':23,'애':24,'겔':25,'단':26,'호':27,'욜':28,'암':29,'옵':30,'욘':31,'미':32,'나':33,'합':34,'습':35,'학':36,'슥':37,'말':38,'마':39,'막':40,'눅':41,'요':42,'행':43,'롬':44,'고전':45,'고후':46,'갈':47,'엡':48,'빌':49,'골':50,'살전':51,'살후':52,'딤전':53,'딤후':54,'딛':55,'몬':56,'히':57,'약':58,'벧전':59,'벧후':60,'요일':61,'요이':62,'요삼':63,'유':64,'계':65};
const VERSIONS = [["ko_gae","개역개정"],["ko_new","새번역"],["en_nkjv","NKJV"],["en_esv","ESV"],["ja","일본신개역"],["zh","화합본(간체)"],["zh_trad","화합본(번체)"],["in","Terjemahan Baru"]];
const VER_LABEL = Object.fromEntries(VERSIONS);
function versionChoiceFor(v){ if(v==="ko_gae"||v==="ko_new")return{ko:v}; if(v==="en_nkjv"||v==="en_esv")return{en:v}; if(v==="zh"||v==="zh_trad")return{zh:v}; return{}; }

const LS_POS = "bible-reader-pos", LS_SET = "bible-reader-settings";
const FONT_MIN = 14, FONT_MAX = 30, LH_MIN = 1.5, LH_MAX = 2.8;
const state = {
  version:"ko_gae", bookIdx:42, chapter:1, maxChapter:1, verses:[],
  selStart:null, selEnd:null,
  gotoBookIdx:42, gotoChapter:0, gotoTestament:"all",
  theme:"system", fontSize:17, lineHeight:2.0,
  parallel:false, parLabels:true, parVersions:["ko_gae","en_nkjv"], parData:[],
};
const $ = (s) => document.querySelector(s);
const isBdb = (v) => typeof v === "string" && v.startsWith("bdb:");
function escapeHtml(s){ return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

// ═══════════════════════════════════════════
// 설정 (테마 / 글자 / 줄간격)
// ═══════════════════════════════════════════
function loadSettings() {
  try { const s = JSON.parse(localStorage.getItem(LS_SET) || "null");
    if (s) {
      state.theme = s.theme || "system"; state.fontSize = s.fontSize || 17; state.lineHeight = s.lineHeight || 2.0;
      state.parallel = !!s.parallel;
      if (typeof s.parLabels === "boolean") state.parLabels = s.parLabels;
      if (Array.isArray(s.parVersions) && s.parVersions.length) state.parVersions = s.parVersions;
    }
  } catch (e) {}
}
function saveSettings() { try { localStorage.setItem(LS_SET, JSON.stringify({ theme: state.theme, fontSize: state.fontSize, lineHeight: state.lineHeight, parallel: state.parallel, parLabels: state.parLabels, parVersions: state.parVersions })); } catch (e) {} }
const _mql = window.matchMedia("(prefers-color-scheme: dark)");
function effectiveTheme() { return state.theme === "system" ? (_mql.matches ? "dark" : "light") : state.theme; }
function applyTheme() { document.documentElement.setAttribute("data-theme", effectiveTheme()); }
_mql.addEventListener("change", () => { if (state.theme === "system") applyTheme(); });
function applyReadStyle() {
  document.documentElement.style.setProperty("--read-font", state.fontSize + "px");
  document.documentElement.style.setProperty("--read-lh", state.lineHeight.toFixed(1));
}
function syncSettingsUI() {
  document.querySelectorAll("#set-theme button").forEach(b => b.classList.toggle("on", b.dataset.m === state.theme));
  $("#val-font").textContent = state.fontSize;
  $("#val-lh").textContent = state.lineHeight.toFixed(1);
}
function openSettings() { syncSettingsUI(); $("#set-overlay").classList.add("show"); }
function closeSettings() { $("#set-overlay").classList.remove("show"); }
function setTheme(m) { state.theme = m; applyTheme(); saveSettings(); syncSettingsUI(); }
function adjFont(d) { state.fontSize = Math.max(FONT_MIN, Math.min(FONT_MAX, state.fontSize + d)); applyReadStyle(); saveSettings(); syncSettingsUI(); }
function adjLh(d) { state.lineHeight = Math.max(LH_MIN, Math.min(LH_MAX, Math.round((state.lineHeight + d * 0.1) * 10) / 10)); applyReadStyle(); saveSettings(); syncSettingsUI(); }

// ═══════════════════════════════════════════
// sql.js (사용자 .bdb)
// ═══════════════════════════════════════════
let _sqlPromise = null; const _sqlDbs = {};
function initSql() { if (!_sqlPromise) _sqlPromise = initSqlJs({ locateFile: f => "lib/sqljs/" + f }); return _sqlPromise; }
async function openBdb(id) { if (_sqlDbs[id]) return _sqlDbs[id]; const bytes = await BdbStore.getBytes(id); if (!bytes) throw new Error("역본 데이터를 찾을 수 없습니다."); const SQL = await initSql(); const db = new SQL.Database(new Uint8Array(bytes)); _sqlDbs[id] = db; return db; }
function bdbTable(db) { const r = db.exec("SELECT name FROM sqlite_master WHERE type='table' AND lower(name)='bible' LIMIT 1"); return (r.length && r[0].values.length) ? r[0].values[0][0] : "Bible"; }
function cleanBdb(t) { if (!t) return ""; return String(t).replace(/→[\s\S]*$/,"").replace(/<[^>]+>/g,"").replace(/[①-⑳]/g,"").replace(/\s+/g," ").trim(); }

// ═══════════════════════════════════════════
// provider
// ═══════════════════════════════════════════
async function getMaxChapter(bookNum, version) {
  if (isBdb(version)) { const db = await openBdb(version), t = bdbTable(db); const r = db.exec(`SELECT MAX(chapter) FROM "${t}" WHERE book=${bookNum}`); return ((r.length && r[0].values[0][0]) || 0) || 1; }
  const book = await BibleDB.fetchBook(bookNum); const chs = Object.keys(book.verses).map(k => +k.split(".")[0]); return chs.length ? Math.max(...chs) : 1;
}
async function getVerseCount(bookNum, chapter, version) {
  if (isBdb(version)) { const db = await openBdb(version), t = bdbTable(db); const r = db.exec(`SELECT MAX(verse) FROM "${t}" WHERE book=${bookNum} AND chapter=${chapter}`); return ((r.length && r[0].values[0][0]) || 0); }
  const book = await BibleDB.fetchBook(bookNum); const vs = Object.keys(book.verses).filter(k => k.startsWith(chapter + ".")).map(k => +k.split(".")[1]); return vs.length ? Math.max(...vs) : 0;
}
async function getChapterVerses(bookNum, chapter, version) {
  if (isBdb(version)) { const db = await openBdb(version), t = bdbTable(db); const r = db.exec(`SELECT verse, btext FROM "${t}" WHERE book=${bookNum} AND chapter=${chapter} ORDER BY verse`); if (!r.length) return []; return r[0].values.map(([v, txt]) => ({ v: +v, text: cleanBdb(txt) })); }
  const book = await BibleDB.fetchBook(bookNum);
  return Object.keys(book.verses).filter(k => k.startsWith(chapter + ".")).map(k => ({ v: +k.split(".")[1], text: book.verses[k][version] || "" })).filter(x => x.text).sort((a, b) => a.v - b.v);
}

// ═══════════════════════════════════════════
// 장 표시
// ═══════════════════════════════════════════
function savePos() { try { localStorage.setItem(LS_POS, JSON.stringify({ version: state.version, bookIdx: state.bookIdx, chapter: state.chapter })); } catch (e) {} }
function restorePos() { try { const p = JSON.parse(localStorage.getItem(LS_POS) || "null"); if (p && typeof p.bookIdx === "number") { state.version = p.version || state.version; state.bookIdx = p.bookIdx; state.chapter = p.chapter || 1; } } catch (e) {} }
function verNameShort(v) { return isBdb(v) ? v.slice(4) : (VER_LABEL[v] || v); }
function baseVersion() { return state.parallel && state.parVersions.length ? state.parVersions[0] : state.version; }
function updateChips() {
  const [, koName] = BOOKS[state.bookIdx];
  const label = state.parallel ? "역본대조" : verNameShort(state.version);
  $("#loc-text").textContent = `${koName} ${state.chapter} · ${label}`;
}
async function showChapter() {
  clearSel();
  const bookNum = state.bookIdx + 1;
  $("#reader").innerHTML = `<div class="loading">불러오는 중…</div>`;
  try {
    state.maxChapter = await getMaxChapter(bookNum, baseVersion());
    if (state.chapter > state.maxChapter) state.chapter = 1;
    if (state.parallel && state.parVersions.length) {
      state.parData = await getParallelChapter(bookNum, state.chapter, state.parVersions);
    } else {
      state.verses = await getChapterVerses(bookNum, state.chapter, state.version);
    }
    savePos(); updateChips(); renderVerses();
  } catch (e) { $("#reader").innerHTML = `<div class="reader-msg">불러오지 못했습니다.<br><small>${escapeHtml(e.message)}</small></div>`; }
}
async function getParallelChapter(bookNum, chapter, versions) {
  const per = await Promise.all(versions.map(v =>
    getChapterVerses(bookNum, chapter, v).then(arr => ({ ver: v, arr })).catch(() => ({ ver: v, arr: [] }))));
  const map = new Map();
  per.forEach(({ ver, arr }) => arr.forEach(({ v, text }) => { if (!map.has(v)) map.set(v, {}); map.get(v)[ver] = text; }));
  return [...map.keys()].sort((a, b) => a - b).map(v => ({ v, cells: map.get(v) }));
}
function renderVerses() {
  const [, koName] = BOOKS[state.bookIdx];
  if (state.parallel && state.parVersions.length) { renderParallel(koName); return; }
  let html = `<div class="chapter-head">${koName} ${state.chapter}장</div>`;
  if (!state.verses.length) html += `<div class="reader-msg">이 역본에는 해당 장 본문이 없습니다.</div>`;
  else html += state.verses.map(({ v, text }) => `<span class="verse" data-v="${v}" onclick="tapVerse(${v})"><span class="vnum">${v}</span>${escapeHtml(text)}</span>`).join("");
  $("#reader").innerHTML = html; $("#reader").scrollTop = 0;
  updateNavButtons(); renderSelHighlight();
}
function renderParallel(koName) {
  let html = `<div class="chapter-head">${koName} ${state.chapter}장 · 역본대조</div>`;
  if (!state.parData.length) html += `<div class="reader-msg">본문이 없습니다.</div>`;
  else html += state.parData.map(({ v, cells }) => {
    const lines = state.parVersions.filter(ver => cells[ver]).map(ver => {
      const label = state.parLabels ? `<span class="pv-label">[${escapeHtml(verNameShort(ver))}]</span>` : "";
      return `<div class="pv-line">${label}<span class="pv-txt">${escapeHtml(cells[ver])}</span></div>`;
    }).join("");
    return `<div class="pverse" data-v="${v}" onclick="tapVerse(${v})"><span class="pvnum">${v}</span><div class="pv-lines">${lines}</div></div>`;
  }).join("");
  $("#reader").innerHTML = html; $("#reader").scrollTop = 0;
  updateNavButtons(); renderSelHighlight();
}
function updateNavButtons() {
  $("#btn-prev").disabled = (state.bookIdx === 0 && state.chapter === 1);
  $("#btn-next").disabled = (state.bookIdx === BOOKS.length - 1 && state.chapter === state.maxChapter);
}
async function goNext() { if (state.chapter < state.maxChapter) state.chapter++; else if (state.bookIdx < BOOKS.length - 1) { state.bookIdx++; state.chapter = 1; } else return; await showChapter(); }
async function goPrev() { if (state.chapter > 1) state.chapter--; else if (state.bookIdx > 0) { state.bookIdx--; state.chapter = await getMaxChapter(state.bookIdx + 1, baseVersion()); } else return; await showChapter(); }

// ═══════════════════════════════════════════
// 찾아가기: 역본 → 구약/신약 → 책 → 장 → 절(숫자)
// ═══════════════════════════════════════════
function fillGotoVersions() {
  BdbStore.list().then(userVers => {
    let html = VERSIONS.map(([v, l]) => `<option value="${v}">◆ ${l}</option>`).join("");
    if (userVers.length) html += userVers.map(u => `<option value="${escapeHtml(u.id)}">◇ ${escapeHtml(u.name)}</option>`).join("");
    $("#goto-version").innerHTML = html;
    $("#goto-version").value = state.version;
  }).catch(() => { $("#goto-version").innerHTML = VERSIONS.map(([v, l]) => `<option value="${v}">◆ ${l}</option>`).join(""); $("#goto-version").value = state.version; });
}
function openGoto() {
  state.gotoBookIdx = state.bookIdx; state.gotoChapter = 0;
  $("#goto-input").value = ""; $("#gv-input").value = "";
  $("#gv-sel").textContent = "책·장을 선택하세요";
  fillGotoVersions(); renderGotoBooks(); renderGotoChapters();
  $("#goto-overlay").classList.add("show");
}
function closeGoto() { $("#goto-overlay").classList.remove("show"); }
async function onGotoVersionChange(v) { state.version = v; state.chapter = 1; savePos(); await renderGotoChapters(); showChapter(); }
function setTestament(t) { state.gotoTestament = t; document.querySelectorAll("#goto-testament button").forEach(b => b.classList.toggle("on", b.dataset.t === t)); renderGotoBooks(); }
function renderGotoBooks() {
  const col = $("#goto-books");
  col.innerHTML = BOOKS.map(([code, ko], i) => {
    if (state.gotoTestament === "ot" && i >= OT_COUNT) return "";
    if (state.gotoTestament === "nt" && i < OT_COUNT) return "";
    return `<div class="goto-item${i === state.gotoBookIdx ? " on" : ""}" onclick="selectGotoBook(${i})"><span class="dot ${i < OT_COUNT ? "ot" : "nt"}"></span>${ko}</div>`;
  }).join("");
  const on = col.querySelector(".on"); if (on) on.scrollIntoView({ block: "center" });
}
async function selectGotoBook(i) { state.gotoBookIdx = i; state.gotoChapter = 0; renderGotoBooks(); updateGvSel(); await renderGotoChapters(); }
async function renderGotoChapters() {
  const col = $("#goto-chapters"); col.innerHTML = `<div class="goto-item goto-num" style="color:var(--dim)">…</div>`;
  const maxC = await getMaxChapter(state.gotoBookIdx + 1, state.version);
  let html = ""; for (let c = 1; c <= maxC; c++) html += `<div class="goto-item goto-num${c === state.gotoChapter ? " on" : ""}" onclick="selectGotoChapter(${c})">${c}</div>`;
  col.innerHTML = html;
}
function selectGotoChapter(c) {
  state.gotoChapter = c;
  document.querySelectorAll("#goto-chapters .goto-item").forEach(el => el.classList.toggle("on", el.textContent.trim() === String(c)));
  updateGvSel();
  $("#gv-input").focus();
}
function updateGvSel() {
  const [, koName] = BOOKS[state.gotoBookIdx];
  $("#gv-sel").textContent = state.gotoChapter ? `${koName} ${state.gotoChapter}장` : `${koName} — 장 선택`;
}
function applyVerseGo() {
  if (!state.gotoChapter) { showToast("장을 먼저 선택하세요"); return; }
  const v = parseInt($("#gv-input").value, 10);
  applyGoto(state.gotoBookIdx, state.gotoChapter, v > 0 ? v : 1);
}
async function applyGoto(bookIdx, chapter, verse) {
  state.bookIdx = bookIdx; state.chapter = chapter; closeGoto();
  await showChapter();
  if (verse) { const el = document.querySelector(`.verse[data-v="${verse}"]`); if (el) { el.scrollIntoView({ block: "center" }); tapVerse(verse); } }
}
function applyGotoInput() {
  const raw = ($("#goto-input").value || "").trim(); if (!raw) return;
  let bookIdx = state.bookIdx, rest = raw, matchedBook = false;
  for (const ab of Object.keys(KO_ABBR).sort((a, b) => b.length - a.length)) { if (raw.startsWith(ab)) { bookIdx = KO_ABBR[ab]; rest = raw.slice(ab.length).trim(); matchedBook = true; break; } }
  const nums = rest.match(/\d+/g), trail = /\d\D+$/.test(rest);
  let chapter = 1, verse = 0;
  if (!nums) { chapter = 1; verse = 1; }
  else if (nums.length === 1) { if (matchedBook) { chapter = +nums[0]; verse = 1; } else if (trail) { chapter = +nums[0]; verse = 1; } else { chapter = state.chapter; verse = +nums[0]; } }
  else { chapter = +nums[0]; verse = +nums[1]; }
  applyGoto(bookIdx, chapter, verse || 0);
}

// ═══════════════════════════════════════════
// 역본대조 (병렬 읽기)
// ═══════════════════════════════════════════
async function openParallelPanel() {
  $("#par-on").checked = state.parallel;
  $("#par-labels").checked = state.parLabels;
  await renderParList();
  $("#par-overlay").classList.add("show");
}
function closeParallelPanel() { $("#par-overlay").classList.remove("show"); }
async function renderParList() {
  let userVers = []; try { userVers = await BdbStore.list(); } catch (e) {}
  const all = VERSIONS.map(([v, l]) => ({ id: v, name: l, user: false }))
    .concat(userVers.map(u => ({ id: u.id, name: u.name, user: true })));
  $("#par-list").innerHTML = all.map(x => {
    const on = state.parVersions.includes(x.id);
    return `<div class="par-item${on ? " on" : ""}" onclick="toggleParVersion('${x.id.replace(/'/g,"\\'")}')">
      <span class="par-check">${on ? "✓" : ""}</span>
      <span class="par-diamond ${x.user ? "user" : "bundle"}">◆</span>
      <span style="flex:1">${escapeHtml(x.name)}</span></div>`;
  }).join("");
}
function toggleParallel(on) {
  state.parallel = on;
  if (on && !state.parVersions.length) state.parVersions = ["ko_gae", "en_nkjv"];
  saveSettings(); showChapter();
}
function toggleParLabels(on) { state.parLabels = on; saveSettings(); if (state.parallel) renderVerses(); }
function toggleParVersion(id) {
  const i = state.parVersions.indexOf(id);
  if (i >= 0) { if (state.parVersions.length > 1) state.parVersions.splice(i, 1); }
  else state.parVersions.push(id);
  saveSettings(); renderParList();
  if (state.parallel) showChapter();
}

// ═══════════════════════════════════════════
// 성구 검색
// ═══════════════════════════════════════════
const SEARCH_MAX = 500;
let _searchScope = "all", _searching = false;
// 책 인덱스 → 짧은 한글 약어 (검색결과 표시용)
const IDX_ABBR = (() => { const m = {}; for (const [ab, i] of Object.entries(KO_ABBR)) if (!(i in m) || ab.length < m[i].length) m[i] = ab; return m; })();

function fillSearchVersions() {
  BdbStore.list().then(u => {
    let html = VERSIONS.map(([v, l]) => `<option value="${v}">◆ ${l}</option>`).join("");
    if (u.length) html += u.map(x => `<option value="${escapeHtml(x.id)}">◇ ${escapeHtml(x.name)}</option>`).join("");
    $("#search-version").innerHTML = html; $("#search-version").value = state.version;
  }).catch(() => { $("#search-version").innerHTML = VERSIONS.map(([v, l]) => `<option value="${v}">◆ ${l}</option>`).join(""); $("#search-version").value = state.version; });
}
function openSearch() {
  fillSearchVersions();
  showHistory();
  $("#search-overlay").classList.add("show");
  setTimeout(() => $("#search-input").focus(), 100);
}
function closeSearch() { $("#search-overlay").classList.remove("show"); }
function setSearchScope(t) { _searchScope = t; document.querySelectorAll("#search-scope button").forEach(b => b.classList.toggle("on", b.dataset.t === t)); }

// ── 검색 이력 (최근 10개, 오래된 것부터 삭제) ──
const LS_HIST = "bible-search-history";
function loadHist() { try { return JSON.parse(localStorage.getItem(LS_HIST) || "[]"); } catch (e) { return []; } }
function saveHist(h) { try { localStorage.setItem(LS_HIST, JSON.stringify(h)); } catch (e) {} }
function addHist(term, version, scope) {
  let h = loadHist().filter(x => !(x.term === term && x.version === version && x.scope === scope));
  h.unshift({ term, version, scope });
  if (h.length > 10) h = h.slice(0, 10);   // 초과분(오래된 것) 제거
  saveHist(h);
}
function delHist(i) { const h = loadHist(); h.splice(i, 1); saveHist(h); showHistory(); }
function scopeKo(s) { return s === "ot" ? "구약" : s === "nt" ? "신약" : "전체"; }
function showHistory() {
  const box = $("#search-results");
  const h = loadHist();
  if (!h.length) { box.innerHTML = `<div class="reader-msg" style="font-size:13px">찾을 말을 입력하고 [검색]을 누르세요.<br><small>검색하면 최근 10개가 여기에 남습니다.</small></div>`; return; }
  box.innerHTML = `<div class="search-sum">🕘 최근 검색</div>` + h.map((x, i) =>
    `<div class="hist-item">
       <div class="hist-info"><span class="hist-term">${escapeHtml(x.term)}</span><span class="hist-meta">${escapeHtml(verNameShort(x.version))} · ${scopeKo(x.scope)}</span></div>
       <button class="hist-btn view" onclick="reSearch(${i})">보기</button>
       <button class="hist-btn del" onclick="delHist(${i})">삭제</button>
     </div>`).join("");
}
function reSearch(i) {
  const x = loadHist()[i]; if (!x) return;
  const sel = $("#search-version");
  if ([...sel.options].some(o => o.value === x.version)) sel.value = x.version;
  setSearchScope(x.scope);
  $("#search-input").value = x.term;
  runSearch();
}

function highlightHtml(text, terms) {
  let h = escapeHtml(text);
  terms.forEach(w => { const we = escapeHtml(w); if (we) h = h.split(we).join(`<mark>${we}</mark>`); });
  return h;
}

async function runSearch() {
  if (_searching) return;
  const term = ($("#search-input").value || "").trim();
  if (!term) return;
  const version = $("#search-version").value;
  const terms = term.split(/\s+/).filter(Boolean);
  const single = terms.length === 1;
  const [sb, eb] = _searchScope === "ot" ? [1, 39] : _searchScope === "nt" ? [40, 66] : [1, 66];
  const box = $("#search-results");
  const res = []; let occ = 0;
  _searching = true; $("#search-go").textContent = "…";
  box.innerHTML = `<div class="reader-msg" style="font-size:13px">검색 중…</div>`;
  try {
    if (isBdb(version)) {
      const db = await openBdb(version), t = bdbTable(db);
      const r = db.exec(`SELECT book,chapter,verse,btext FROM "${t}" WHERE book>=${sb} AND book<=${eb} ORDER BY book,chapter,verse`);
      if (r.length) for (const [b, c, v, raw] of r[0].values) {
        const text = cleanBdb(raw);
        if (terms.every(w => text.includes(w))) { res.push({ b, c, v, text }); if (single) occ += text.split(terms[0]).length - 1; if (res.length >= SEARCH_MAX) break; }
      }
    } else {
      for (let b = sb; b <= eb; b++) {
        box.innerHTML = `<div class="reader-msg" style="font-size:13px">검색 중… ${b - sb + 1}/${eb - sb + 1}권</div>`;
        const book = await BibleDB.fetchBook(b);
        for (const k of Object.keys(book.verses)) {
          const text = book.verses[k][version]; if (!text) continue;
          if (terms.every(w => text.includes(w))) { const [c, v] = k.split(".").map(Number); res.push({ b, c, v, text }); if (single) occ += text.split(terms[0]).length - 1; }
        }
        if (res.length >= SEARCH_MAX) break;
      }
      res.sort((a, b) => a.b - b.b || a.c - b.c || a.v - b.v);
    }
  } catch (e) { box.innerHTML = `<div class="reader-msg">검색 실패: ${escapeHtml(e.message)}</div>`; _searching = false; $("#search-go").textContent = "검색"; return; }
  _searching = false; $("#search-go").textContent = "검색";
  addHist(term, version, _searchScope);   // 검색 성공 시 이력 기록
  renderSearchResults(res.slice(0, SEARCH_MAX), terms, occ, single, res.length >= SEARCH_MAX);
}

function renderSearchResults(res, terms, occ, single, capped) {
  const box = $("#search-results");
  const back = `<div class="search-back" onclick="showHistory()">← 최근 검색으로</div>`;
  if (!res.length) { box.innerHTML = back + `<div class="reader-msg" style="font-size:13px">검색 결과가 없습니다.</div>`; return; }
  const scopeLabel = _searchScope === "ot" ? "구약" : _searchScope === "nt" ? "신약" : "성경 전체";
  const summary = `<div class="search-sum">${scopeLabel} · <b>${res.length}${capped ? "+" : ""}</b>절${single ? ` · "${escapeHtml(terms[0])}" <b>${occ}</b>회` : ""}</div>`;
  const items = res.map(({ b, c, v, text }) =>
    `<div class="search-item" onclick="jumpFromSearch(${b - 1},${c},${v})"><span class="si-ref">${IDX_ABBR[b - 1] || ""} ${c}:${v}</span><span class="si-text">${highlightHtml(text, terms)}</span></div>`
  ).join("");
  const note = capped ? `<div class="reader-msg" style="font-size:12px">처음 ${SEARCH_MAX}절만 표시합니다.</div>` : "";
  box.innerHTML = back + summary + items + note;
}
function jumpFromSearch(bookIdx, chapter, verse) { closeSearch(); applyGoto(bookIdx, chapter, verse); }

// ═══════════════════════════════════════════
// 성경 DB 관리(역본) 패널
// ═══════════════════════════════════════════
async function openVersionPanel() { await renderVersionList(); $("#ver-overlay").classList.add("show"); }
function closeVersionPanel() { $("#ver-overlay").classList.remove("show"); }
async function renderVersionList() {
  let userVers = []; try { userVers = await BdbStore.list(); } catch (e) {}
  let html = `<div class="ver-section">내장 역본 (금색)</div>`;
  html += VERSIONS.map(([v, l]) => `<div class="ver-item${v === state.version ? " on" : ""}" onclick="selectVersion('${v}')"><span class="vdiamond bundle">◆</span><span class="vlabel">${l}</span></div>`).join("");
  html += `<div class="ver-section">내가 불러온 역본 (파란색)</div>`;
  if (userVers.length) html += userVers.map(u => `<div class="ver-item${u.id === state.version ? " on" : ""}"><span class="vdiamond user">◆</span><span class="vlabel" onclick="selectVersion('${u.id.replace(/'/g,"\\'")}')">${escapeHtml(u.name)}</span><button class="vdel" onclick="event.stopPropagation();removeBdb('${u.id.replace(/'/g,"\\'")}')">삭제</button></div>`).join("");
  else html += `<div style="padding:10px 16px;color:var(--dim);font-size:13px">아직 없음. 아래에서 .bdb 파일을 불러오세요.</div>`;
  $("#ver-list").innerHTML = html;
}
async function selectVersion(v) { state.version = v; state.chapter = 1; savePos(); closeVersionPanel(); showChapter(); }

$("#bdb-file").addEventListener("change", async (e) => {
  const file = e.target.files[0]; e.target.value = ""; if (!file) return;
  try {
    const buf = await file.arrayBuffer(); const SQL = await initSql();
    let db; try { db = new SQL.Database(new Uint8Array(buf)); } catch (err) { throw new Error("SQLite 파일이 아닙니다."); }
    let ok = false; try { const t = bdbTable(db); ok = db.exec(`SELECT book,chapter,verse,btext FROM "${t}" LIMIT 1`).length > 0; } catch (err) { ok = false; }
    db.close(); if (!ok) throw new Error("성경 역본(.bdb) 형식이 아닙니다. (주석 .cdb는 미지원)");
    const name = file.name.replace(/\.(bdb|sdb)$/i, ""), id = "bdb:" + name;
    await BdbStore.save(id, name, buf); delete _sqlDbs[id];
    state.version = id; state.chapter = 1; savePos();
    await renderVersionList(); closeVersionPanel(); showToast(`✓ "${name}" 불러옴`); showChapter();
  } catch (err) { showToast("✗ " + err.message); }
});
async function removeBdb(id) {
  if (!confirm("이 역본을 삭제할까요? (기기에서만 제거)")) return;
  await BdbStore.remove(id); if (_sqlDbs[id]) { try { _sqlDbs[id].close(); } catch (e) {} delete _sqlDbs[id]; }
  if (state.version === id) { state.version = "ko_gae"; state.chapter = 1; savePos(); }
  await renderVersionList(); showChapter();
}

// ═══════════════════════════════════════════
// 구절 선택
// ═══════════════════════════════════════════
function tapVerse(v) {
  if (state.selStart === null) state.selStart = state.selEnd = v;
  else if (state.selStart === state.selEnd) { if (v === state.selStart) { clearSel(); return; } state.selStart = Math.min(state.selStart, v); state.selEnd = Math.max(state.selEnd, v); }
  else state.selStart = state.selEnd = v;
  renderSelHighlight(); updateActionBar();
}
function clearSel() { state.selStart = state.selEnd = null; renderSelHighlight(); updateActionBar(); }
function renderSelHighlight() {
  document.querySelectorAll(".verse, .pverse").forEach(el => {
    const v = +el.dataset.v; el.classList.remove("sel", "in-range");
    if (state.selStart === null) return;
    if (state.selStart === state.selEnd) { if (v === state.selStart) el.classList.add("sel"); }
    else if (v >= state.selStart && v <= state.selEnd) el.classList.add(v === state.selStart || v === state.selEnd ? "sel" : "in-range");
  });
}
function currentRefKo() { const [, koName] = BOOKS[state.bookIdx]; const range = state.selEnd > state.selStart ? `${state.selStart}-${state.selEnd}` : `${state.selStart}`; return `${koName} ${state.chapter}:${range}`; }
function currentRefUsfm() { const [code] = BOOKS[state.bookIdx]; const range = state.selEnd > state.selStart ? `${state.selStart}-${state.selEnd}` : `${state.selStart}`; return `${code}.${state.chapter}.${range}`; }
function updateActionBar() { const bar = $("#action-bar"); if (state.selStart === null) { bar.classList.remove("show"); return; } $("#ab-ref").textContent = currentRefKo(); bar.classList.add("show"); }

// ═══════════════════════════════════════════
// 기억절 추가
// ═══════════════════════════════════════════
let _pendingLookup = null;
async function openAddModal() {
  if (state.selStart === null) return;
  $("#m-ref").textContent = currentRefKo(); $("#m-topic").value = "";
  $("#m-preview").innerHTML = `<span style="color:var(--dim)">다국어 조회 중…</span>`; $("#m-save").disabled = true;
  $("#add-overlay").classList.add("show");
  try {
    _pendingLookup = await BibleDB.lookup(currentRefUsfm(), versionChoiceFor(state.version));
    const flag = { ko:"🇰🇷", en:"🇺🇸", ja:"🇯🇵", zh:"🇨🇳", in:"🇮🇩" };
    $("#m-preview").innerHTML = ["ko","en","ja","zh","in"].filter(l => _pendingLookup.verses[l]).map(l => `<div><span class="mp-lang">${flag[l]}</span>${escapeHtml(_pendingLookup.verses[l].slice(0,60))}${_pendingLookup.verses[l].length>60?"…":""}</div>`).join("");
    $("#m-save").disabled = false; $("#m-topic").focus();
  } catch (e) { _pendingLookup = null; $("#m-preview").innerHTML = `<span style="color:#e94560">조회 실패: ${escapeHtml(e.message)}</span>`; }
}
function closeAddModal() { $("#add-overlay").classList.remove("show"); _pendingLookup = null; }
function saveVerse() {
  if (!_pendingLookup) return;
  const topic = $("#m-topic").value.trim() || currentRefKo();
  const { verses, refs } = _pendingLookup;
  UserVerseManager.add({ topic, lang: "ko", reference: refs.ko || currentRefKo(), verse: verses.ko || "", multilang: true, verses, refs });
  closeAddModal(); clearSel(); showToast(`"${topic}" 저장됨 ✓`);
}
let _toastTimer = null;
function showToast(msg) { const t = $("#toast"); t.textContent = msg; t.classList.add("show"); if (_toastTimer) clearTimeout(_toastTimer); _toastTimer = setTimeout(() => t.classList.remove("show"), 2000); }

// 오버레이 바깥 탭 닫기
$("#goto-overlay").addEventListener("click", e => { if (e.target === $("#goto-overlay")) closeGoto(); });
$("#search-overlay").addEventListener("click", e => { if (e.target === $("#search-overlay")) closeSearch(); });
$("#par-overlay").addEventListener("click", e => { if (e.target === $("#par-overlay")) closeParallelPanel(); });
$("#set-overlay").addEventListener("click", e => { if (e.target === $("#set-overlay")) closeSettings(); });
$("#ver-overlay").addEventListener("click", e => { if (e.target === $("#ver-overlay")) closeVersionPanel(); });
$("#add-overlay").addEventListener("click", e => { if (e.target === $("#add-overlay")) closeAddModal(); });

// 좌우 스와이프 → 장 이동
let _tsx = 0, _tsy = 0;
$("#reader").addEventListener("touchstart", e => { _tsx = e.touches[0].clientX; _tsy = e.touches[0].clientY; }, { passive: true });
$("#reader").addEventListener("touchend", e => { const dx = e.changedTouches[0].clientX - _tsx, dy = e.changedTouches[0].clientY - _tsy; if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.8) { dx < 0 ? goNext() : goPrev(); } }, { passive: true });

// ═══════════════════════════════════════════
// 시작
// ═══════════════════════════════════════════
(async function start() {
  loadSettings(); applyTheme(); applyReadStyle();
  restorePos();
  if (isBdb(state.version)) { try { const list = await BdbStore.list(); if (!list.some(u => u.id === state.version)) state.version = "ko_gae"; } catch (e) { state.version = "ko_gae"; } }
  showChapter();
})();
</script>

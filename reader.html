<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>성경 읽기</title>
<style>
  :root {
    --bg: #1a1a2e; --bg2: #16213e; --card: #0f2036;
    --gold: #c9a84c; --text: #f0f0f0; --dim: #a0a0b8;
    --sel: rgba(201,168,76,0.22); --line: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column; height: 100dvh; overflow: hidden;
  }

  /* ── 상단 네비 ── */
  header {
    flex-shrink: 0; background: var(--bg2); border-bottom: 1px solid var(--line);
    padding: 10px 12px; display: flex; flex-direction: column; gap: 8px;
  }
  .hdr-top { display: flex; align-items: center; gap: 8px; }
  .hdr-title { font-size: 15px; font-weight: 700; color: var(--gold); flex: 1; }
  .app-link {
    font-size: 12px; color: var(--gold); text-decoration: none;
    border: 1px solid rgba(201,168,76,0.35); border-radius: 999px; padding: 4px 12px;
    background: rgba(201,168,76,0.1);
  }
  .nav-row { display: flex; gap: 6px; align-items: stretch; }
  select {
    background: var(--card); border: 1px solid rgba(201,168,76,0.25);
    border-radius: 8px; color: var(--text); font-family: inherit; font-size: 13px;
    padding: 8px 10px; outline: none; -webkit-appearance: none; appearance: none;
  }
  select:focus { border-color: var(--gold); }
  #sel-version { flex: 0 0 auto; max-width: 42%; }
  #sel-book { flex: 1; min-width: 0; }
  #sel-chapter { flex: 0 0 auto; width: 72px; text-align: center; }

  /* ── 읽기 영역 ── */
  main {
    flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 16px 16px 96px;
  }
  .chapter-head {
    text-align: center; color: var(--gold); font-size: 15px; font-weight: 700;
    margin: 4px 0 16px; letter-spacing: 0.5px;
  }
  .verse {
    display: block; line-height: 1.95; font-size: 17px; padding: 3px 6px;
    border-radius: 8px; cursor: pointer; transition: background 0.12s;
    margin-bottom: 2px;
  }
  .verse:active { background: rgba(255,255,255,0.05); }
  .verse.sel { background: var(--sel); }
  .verse.in-range { background: rgba(201,168,76,0.12); }
  .vnum {
    color: var(--gold); font-size: 11px; font-weight: 700; vertical-align: super;
    margin-right: 5px; user-select: none;
  }
  .loading, .reader-msg { text-align: center; color: var(--dim); padding: 40px 20px; font-size: 14px; }

  /* ── 하단 장 이동 ── */
  .foot {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 10;
    display: flex; gap: 8px; padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
    background: linear-gradient(180deg, transparent, var(--bg) 30%);
  }
  .foot-btn {
    flex: 1; background: var(--bg2); border: 1px solid var(--line); color: var(--text);
    font-family: inherit; font-size: 14px; font-weight: 600; padding: 12px; border-radius: 10px;
    cursor: pointer;
  }
  .foot-btn:active { background: var(--card); }
  .foot-btn:disabled { opacity: 0.35; }

  /* ── 선택 액션 바 ── */
  .action-bar {
    position: fixed; left: 12px; right: 12px; bottom: calc(70px + env(safe-area-inset-bottom));
    z-index: 20; background: var(--card); border: 1px solid var(--gold);
    border-radius: 12px; padding: 10px 12px; display: none;
    align-items: center; gap: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .action-bar.show { display: flex; }
  .ab-ref { flex: 1; font-weight: 700; color: var(--gold); font-size: 14px; }
  .ab-btn {
    border: none; border-radius: 8px; font-family: inherit; font-size: 13px;
    font-weight: 600; padding: 8px 14px; cursor: pointer;
  }
  .ab-add { background: var(--gold); color: var(--bg); }
  .ab-clear { background: rgba(255,255,255,0.1); color: var(--text); }

  /* ── 기억절 추가 모달 ── */
  .overlay {
    position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,0.72);
    display: none; align-items: center; justify-content: center; padding: 20px;
  }
  .overlay.show { display: flex; }
  .modal {
    width: 100%; max-width: 440px; background: var(--bg2);
    border: 1px solid var(--line); border-radius: 14px; padding: 18px;
  }
  .modal h3 { font-size: 16px; color: var(--gold); margin-bottom: 4px; }
  .modal .m-ref { font-size: 13px; color: var(--dim); margin-bottom: 14px; }
  .modal label { display: block; font-size: 12px; color: var(--gold); margin: 10px 0 5px; font-weight: 600; }
  .modal input[type=text] {
    width: 100%; background: var(--card); border: 1px solid rgba(201,168,76,0.25);
    border-radius: 8px; color: var(--text); font-family: inherit; font-size: 14px; padding: 10px;
  }
  .m-preview {
    background: var(--card); border-radius: 8px; padding: 10px; margin-top: 10px;
    font-size: 13px; line-height: 1.7; max-height: 160px; overflow-y: auto;
  }
  .m-preview .mp-lang { color: var(--gold); font-size: 11px; font-weight: 700; margin-right: 6px; }
  .m-actions { display: flex; gap: 8px; margin-top: 16px; }
  .m-actions button {
    flex: 1; border: none; border-radius: 10px; font-family: inherit; font-size: 14px;
    font-weight: 600; padding: 12px; cursor: pointer;
  }
  .m-cancel { background: rgba(255,255,255,0.1); color: var(--text); }
  .m-save { background: var(--gold); color: var(--bg); }
  .m-save:disabled { opacity: 0.5; }

  /* ── 토스트 ── */
  .toast {
    position: fixed; left: 50%; bottom: 140px; transform: translateX(-50%);
    background: rgba(0,0,0,0.85); color: #fff; font-size: 13px; padding: 10px 18px;
    border-radius: 999px; z-index: 60; opacity: 0; transition: opacity 0.25s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="hdr-top">
    <span class="hdr-title">📖 성경 읽기</span>
    <a class="app-link" href="index.html">✝ 암송앱</a>
  </div>
  <div class="nav-row">
    <select id="sel-version" title="역본"></select>
    <select id="sel-book" title="성경"></select>
    <select id="sel-chapter" title="장"></select>
  </div>
  <div class="nav-row" style="align-items:center">
    <button class="app-link" style="border:none;cursor:pointer;font-family:inherit" onclick="document.getElementById('bdb-file').click()">＋ 역본 불러오기(.bdb)</button>
    <button id="bdb-manage-btn" class="app-link" style="border:none;cursor:pointer;font-family:inherit;display:none" onclick="openBdbManager()">불러온 역본 관리</button>
    <span id="bdb-status" style="font-size:11px;color:var(--dim);flex:1"></span>
    <input type="file" id="bdb-file" accept=".bdb,.sdb" hidden>
  </div>
</header>

<main id="reader">
  <div class="loading">불러오는 중…</div>
</main>

<!-- 선택 액션 바 -->
<div class="action-bar" id="action-bar">
  <span class="ab-ref" id="ab-ref"></span>
  <button class="ab-btn ab-clear" onclick="clearSel()">해제</button>
  <button class="ab-btn ab-add" onclick="openAddModal()">★ 기억절 추가</button>
</div>

<!-- 하단 장 이동 -->
<div class="foot">
  <button class="foot-btn" id="btn-prev" onclick="goPrev()">◀ 이전 장</button>
  <button class="foot-btn" id="btn-next" onclick="goNext()">다음 장 ▶</button>
</div>

<!-- 기억절 추가 모달 -->
<div class="overlay" id="add-overlay">
  <div class="modal">
    <h3>기억절로 추가</h3>
    <div class="m-ref" id="m-ref"></div>
    <label>주제</label>
    <input type="text" id="m-topic" placeholder="예) 믿음, 사랑, 구원…" autocomplete="off">
    <div class="m-preview" id="m-preview"></div>
    <div class="m-actions">
      <button class="m-cancel" onclick="closeAddModal()">취소</button>
      <button class="m-save" id="m-save" onclick="saveVerse()">저장</button>
    </div>
  </div>
</div>

<!-- 불러온 역본 관리 모달 -->
<div class="overlay" id="bdb-overlay">
  <div class="modal">
    <h3>불러온 역본 관리</h3>
    <div class="m-ref">사용자가 불러온 .bdb 역본 (이 기기에만 저장됨)</div>
    <div id="bdb-list" class="m-preview" style="max-height:220px"></div>
    <div class="m-actions">
      <button class="m-cancel" onclick="closeBdbManager()">닫기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="lib/sqljs/sql-wasm.js"></script>
<script src="js/bdb-store.js?v=1"></script>
<script src="js/bible-db.js?v=2"></script>
<script src="js/user-verses.js?v=2"></script>
<script>
// ═══════════════════════════════════════════
// 데이터: 66권 (USFM 코드 + 한글 이름, 정경 순서)
// ═══════════════════════════════════════════
const BOOKS = [
  ["GEN","창세기"],["EXO","출애굽기"],["LEV","레위기"],["NUM","민수기"],["DEU","신명기"],
  ["JOS","여호수아"],["JDG","사사기"],["RUT","룻기"],["1SA","사무엘상"],["2SA","사무엘하"],
  ["1KI","열왕기상"],["2KI","열왕기하"],["1CH","역대상"],["2CH","역대하"],["EZR","에스라"],
  ["NEH","느헤미야"],["EST","에스더"],["JOB","욥기"],["PSA","시편"],["PRO","잠언"],
  ["ECC","전도서"],["SNG","아가"],["ISA","이사야"],["JER","예레미야"],["LAM","예레미야애가"],
  ["EZK","에스겔"],["DAN","다니엘"],["HOS","호세아"],["JOL","요엘"],["AMO","아모스"],
  ["OBA","오바댜"],["JON","요나"],["MIC","미가"],["NAM","나훔"],["HAB","하박국"],
  ["ZEP","스바냐"],["HAG","학개"],["ZEC","스가랴"],["MAL","말라기"],
  ["MAT","마태복음"],["MRK","마가복음"],["LUK","누가복음"],["JHN","요한복음"],["ACT","사도행전"],
  ["ROM","로마서"],["1CO","고린도전서"],["2CO","고린도후서"],["GAL","갈라디아서"],["EPH","에베소서"],
  ["PHP","빌립보서"],["COL","골로새서"],["1TH","데살로니가전서"],["2TH","데살로니가후서"],
  ["1TI","디모데전서"],["2TI","디모데후서"],["TIT","디도서"],["PHM","빌레몬서"],["HEB","히브리서"],
  ["JAS","야고보서"],["1PE","베드로전서"],["2PE","베드로후서"],["1JN","요한일서"],["2JN","요한이서"],
  ["3JN","요한삼서"],["JUD","유다서"],["REV","요한계시록"]
];

// 읽기용 번들 역본 (data/bible-db 안의 version key)
const VERSIONS = [
  ["ko_gae","🇰🇷 개역개정"], ["ko_new","🇰🇷 새번역"],
  ["en_nkjv","🇺🇸 NKJV"], ["en_esv","🇺🇸 ESV"],
  ["ja","🇯🇵 일본신개역"], ["zh","🇨🇳 화합본(간체)"], ["zh_trad","🇹🇼 화합본(번체)"],
  ["in","🇮🇩 Terjemahan Baru"]
];

// version key → BibleDB.lookup 의 versionChoice 매핑 (기억절 추가 시)
function versionChoiceFor(vkey) {
  if (vkey === "ko_gae" || vkey === "ko_new") return { ko: vkey };
  if (vkey === "en_nkjv" || vkey === "en_esv") return { en: vkey };
  if (vkey === "zh" || vkey === "zh_trad") return { zh: vkey };
  return {}; // ja / in 은 단일 역본 → 기본값 사용
}

const LS_KEY = "bible-reader-pos";
const state = {
  version: "ko_gae",
  bookIdx: 42,   // 요한복음
  chapter: 1,
  maxChapter: 1,
  verses: [],    // 현재 장의 [{v, text}]
  selStart: null,
  selEnd: null,
};

const $ = (s) => document.querySelector(s);
const isBdb = (v) => typeof v === "string" && v.startsWith("bdb:");

// ═══════════════════════════════════════════
// 초기화
// ═══════════════════════════════════════════
function initSelectors() {
  $("#sel-book").innerHTML = BOOKS.map(([c,ko],i) =>
    `<option value="${i}">${i<39?"":"　"}${ko}</option>`).join("");

  $("#sel-version").addEventListener("change", e => { state.version = e.target.value; state.chapter = 1; savePos(); showChapter(); });
  $("#sel-book").addEventListener("change", e => { state.bookIdx = +e.target.value; state.chapter = 1; showChapter(); });
  $("#sel-chapter").addEventListener("change", e => { state.chapter = +e.target.value; clearSel(); savePos(); showChapter(); });

  $("#bdb-file").addEventListener("change", onBdbFilePicked);
}

// 역본 드롭다운: 번들 8개 + 사용자가 불러온 .bdb
async function populateVersions() {
  let userVers = [];
  try { userVers = await BdbStore.list(); } catch (e) {}
  let html = VERSIONS.map(([v,l]) => `<option value="${v}">${l}</option>`).join("");
  if (userVers.length) {
    html += `<optgroup label="── 내가 불러온 역본 ──">` +
      userVers.map(u => `<option value="${u.id}">📗 ${escapeHtml(u.name)}</option>`).join("") +
      `</optgroup>`;
  }
  $("#sel-version").innerHTML = html;
  $("#sel-version").value = state.version;
  $("#bdb-manage-btn").style.display = userVers.length ? "" : "none";
}

function restorePos() {
  try {
    const p = JSON.parse(localStorage.getItem(LS_KEY) || "null");
    if (p && typeof p.bookIdx === "number") {
      state.version = p.version || state.version;
      state.bookIdx = p.bookIdx;
      state.chapter = p.chapter || 1;
    }
  } catch (e) {}
}
function savePos() {
  try { localStorage.setItem(LS_KEY, JSON.stringify({ version: state.version, bookIdx: state.bookIdx, chapter: state.chapter })); } catch (e) {}
}

function syncSelectors() {
  $("#sel-version").value = state.version;
  $("#sel-book").value = String(state.bookIdx);
  const chOpts = [];
  for (let c = 1; c <= state.maxChapter; c++) chOpts.push(`<option value="${c}">${c}장</option>`);
  $("#sel-chapter").innerHTML = chOpts.join("");
  $("#sel-chapter").value = String(state.chapter);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;" }[c]));
}

// ═══════════════════════════════════════════
// sql.js — 사용자 .bdb 원본 조회
// ═══════════════════════════════════════════
let _sqlPromise = null;
const _sqlDbs = {};   // { versionId: SQL.Database }

function initSql() {
  if (!_sqlPromise) _sqlPromise = initSqlJs({ locateFile: f => "lib/sqljs/" + f });
  return _sqlPromise;
}

async function openBdb(versionId) {
  if (_sqlDbs[versionId]) return _sqlDbs[versionId];
  const bytes = await BdbStore.getBytes(versionId);
  if (!bytes) throw new Error("역본 데이터를 찾을 수 없습니다.");
  const SQL = await initSql();
  const db = new SQL.Database(new Uint8Array(bytes));
  _sqlDbs[versionId] = db;
  return db;
}

function bdbTableName(db) {
  const r = db.exec("SELECT name FROM sqlite_master WHERE type='table' AND lower(name)='bible' LIMIT 1");
  return (r.length && r[0].values.length) ? r[0].values[0][0] : "Bible";
}

// .bdb 원문 마크업 정리 (각주·태그·각주번호 제거 → 읽기 텍스트)
function cleanBdb(t) {
  if (!t) return "";
  return String(t)
    .replace(/→[\s\S]*$/, "")      // 꼬리 각주
    .replace(/<[^>]+>/g, "")        // 태그
    .replace(/[①-⑳]/g, "")         // 각주 번호
    .replace(/\s+/g, " ").trim();
}

// ═══════════════════════════════════════════
// 통합 데이터 provider (번들 JSON / 사용자 .bdb)
// ═══════════════════════════════════════════
async function getMaxChapter(bookNum, version) {
  if (isBdb(version)) {
    const db = await openBdb(version);
    const t = bdbTableName(db);
    const r = db.exec(`SELECT MAX(chapter) FROM "${t}" WHERE book=${bookNum}`);
    const m = (r.length && r[0].values[0][0]) || 0;
    return m || 1;
  }
  const book = await BibleDB.fetchBook(bookNum);
  const chs = Object.keys(book.verses).map(k => +k.split(".")[0]);
  return chs.length ? Math.max(...chs) : 1;
}

async function getChapterVerses(bookNum, chapter, version) {
  if (isBdb(version)) {
    const db = await openBdb(version);
    const t = bdbTableName(db);
    const r = db.exec(`SELECT verse, btext FROM "${t}" WHERE book=${bookNum} AND chapter=${chapter} ORDER BY verse`);
    if (!r.length) return [];
    return r[0].values.map(([v, txt]) => ({ v: +v, text: cleanBdb(txt) }));
  }
  const book = await BibleDB.fetchBook(bookNum);
  return Object.keys(book.verses)
    .filter(k => k.startsWith(chapter + "."))
    .map(k => ({ v: +k.split(".")[1], text: book.verses[k][version] || "" }))
    .filter(x => x.text)
    .sort((a, b) => a.v - b.v);
}

// ═══════════════════════════════════════════
// 장 표시
// ═══════════════════════════════════════════
async function showChapter() {
  clearSel();
  const bookNum = state.bookIdx + 1;
  $("#reader").innerHTML = `<div class="loading">불러오는 중…</div>`;
  try {
    state.maxChapter = await getMaxChapter(bookNum, state.version);
    if (state.chapter > state.maxChapter) state.chapter = 1;
    state.verses = await getChapterVerses(bookNum, state.chapter, state.version);
    savePos();
    syncSelectors();
    renderVerses();
  } catch (e) {
    $("#reader").innerHTML = `<div class="reader-msg">불러오지 못했습니다.<br><small>${escapeHtml(e.message)}</small></div>`;
  }
}

function renderVerses() {
  const [, koName] = BOOKS[state.bookIdx];
  let html = `<div class="chapter-head">${koName} ${state.chapter}장</div>`;
  if (!state.verses.length) {
    html += `<div class="reader-msg">이 역본에는 해당 장 본문이 없습니다.</div>`;
  } else {
    html += state.verses.map(({ v, text }) =>
      `<span class="verse" data-v="${v}" onclick="tapVerse(${v})"><span class="vnum">${v}</span>${escapeHtml(text)}</span>`
    ).join("");
  }
  $("#reader").innerHTML = html;
  $("#reader").scrollTop = 0;
  $("#btn-prev").disabled = (state.bookIdx === 0 && state.chapter === 1);
  $("#btn-next").disabled = (state.bookIdx === BOOKS.length - 1 && state.chapter === state.maxChapter);
  renderSelHighlight();
}

// ═══════════════════════════════════════════
// 장 이동 (책 경계 넘김)
// ═══════════════════════════════════════════
async function goNext() {
  if (state.chapter < state.maxChapter) { state.chapter++; }
  else if (state.bookIdx < BOOKS.length - 1) { state.bookIdx++; state.chapter = 1; }
  else return;
  await showChapter();
}
async function goPrev() {
  if (state.chapter > 1) { state.chapter--; }
  else if (state.bookIdx > 0) {
    state.bookIdx--;
    state.chapter = await getMaxChapter(state.bookIdx + 1, state.version);
  } else return;
  await showChapter();
}

// ═══════════════════════════════════════════
// 구절 선택 (단일 → 범위)
// ═══════════════════════════════════════════
function tapVerse(v) {
  if (state.selStart === null) {
    state.selStart = state.selEnd = v;
  } else if (state.selStart === state.selEnd) {
    if (v === state.selStart) { clearSel(); return; }   // 같은 절 재탭 → 해제
    state.selStart = Math.min(state.selStart, v);
    state.selEnd = Math.max(state.selEnd, v);
  } else {
    state.selStart = state.selEnd = v;                  // 범위 상태에서 탭 → 단일 재시작
  }
  renderSelHighlight();
  updateActionBar();
}

function clearSel() {
  state.selStart = state.selEnd = null;
  renderSelHighlight();
  updateActionBar();
}

function renderSelHighlight() {
  document.querySelectorAll(".verse").forEach(el => {
    const v = +el.dataset.v;
    el.classList.remove("sel", "in-range");
    if (state.selStart === null) return;
    if (state.selStart === state.selEnd) {
      if (v === state.selStart) el.classList.add("sel");
    } else if (v >= state.selStart && v <= state.selEnd) {
      el.classList.add(v === state.selStart || v === state.selEnd ? "sel" : "in-range");
    }
  });
}

function currentRefKo() {
  const [, koName] = BOOKS[state.bookIdx];
  // 한글 약어 대신 전체 책이름 사용 (표시용). USFM은 저장 시 별도 생성.
  const range = state.selEnd > state.selStart ? `${state.selStart}-${state.selEnd}` : `${state.selStart}`;
  return `${koName} ${state.chapter}:${range}`;
}
function currentRefUsfm() {
  const [code] = BOOKS[state.bookIdx];
  const range = state.selEnd > state.selStart ? `${state.selStart}-${state.selEnd}` : `${state.selStart}`;
  return `${code}.${state.chapter}.${range}`;
}

function updateActionBar() {
  const bar = $("#action-bar");
  if (state.selStart === null) { bar.classList.remove("show"); return; }
  $("#ab-ref").textContent = currentRefKo();
  bar.classList.add("show");
}

// ═══════════════════════════════════════════
// 기억절 추가
// ═══════════════════════════════════════════
let _pendingLookup = null;

async function openAddModal() {
  if (state.selStart === null) return;
  $("#m-ref").textContent = currentRefKo();
  $("#m-topic").value = "";
  $("#m-preview").innerHTML = `<span style="color:var(--dim)">다국어 조회 중…</span>`;
  $("#m-save").disabled = true;
  $("#add-overlay").classList.add("show");

  try {
    _pendingLookup = await BibleDB.lookup(currentRefUsfm(), versionChoiceFor(state.version));
    const flag = { ko:"🇰🇷", en:"🇺🇸", ja:"🇯🇵", zh:"🇨🇳", in:"🇮🇩" };
    $("#m-preview").innerHTML = ["ko","en","ja","zh","in"]
      .filter(l => _pendingLookup.verses[l])
      .map(l => `<div><span class="mp-lang">${flag[l]}</span>${escapeHtml(_pendingLookup.verses[l].slice(0, 60))}${_pendingLookup.verses[l].length>60?"…":""}</div>`)
      .join("");
    $("#m-save").disabled = false;
    $("#m-topic").focus();
  } catch (e) {
    _pendingLookup = null;
    $("#m-preview").innerHTML = `<span style="color:#e94560">조회 실패: ${e.message}</span>`;
  }
}

function closeAddModal() {
  $("#add-overlay").classList.remove("show");
  _pendingLookup = null;
}

function saveVerse() {
  if (!_pendingLookup) return;
  const topic = $("#m-topic").value.trim() || currentRefKo();
  const { verses, refs } = _pendingLookup;
  UserVerseManager.add({
    topic,
    lang: "ko",
    reference: refs.ko || currentRefKo(),
    verse: verses.ko || "",
    multilang: true,
    verses,
    refs,
  });
  closeAddModal();
  clearSel();
  showToast(`"${topic}" 저장됨 ✓`);
}

let _toastTimer = null;
function showToast(msg) {
  const t = $("#toast");
  t.textContent = msg;
  t.classList.add("show");
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove("show"), 1800);
}

// 모달 바깥 탭 닫기
$("#add-overlay").addEventListener("click", e => { if (e.target === $("#add-overlay")) closeAddModal(); });
$("#bdb-overlay").addEventListener("click", e => { if (e.target === $("#bdb-overlay")) closeBdbManager(); });

// ═══════════════════════════════════════════
// 역본 불러오기 (.bdb 파일 → sql.js 검증 → IndexedDB 캐시)
// ═══════════════════════════════════════════
async function onBdbFilePicked(e) {
  const file = e.target.files[0];
  e.target.value = "";
  if (!file) return;
  const statusEl = $("#bdb-status");
  statusEl.textContent = "역본 확인 중…";
  try {
    const buf = await file.arrayBuffer();
    const bytes = new Uint8Array(buf);
    // sql.js로 열어 유효성 검증 (Bible 테이블 + 필수 컬럼)
    const SQL = await initSql();
    let db;
    try { db = new SQL.Database(bytes); }
    catch (err) { throw new Error("SQLite 파일이 아닙니다."); }
    let ok = false;
    try {
      const t = bdbTableName(db);
      const r = db.exec(`SELECT book, chapter, verse, btext FROM "${t}" LIMIT 1`);
      ok = r.length > 0;
    } catch (err) { ok = false; }
    db.close();
    if (!ok) throw new Error("베들레헴 성경 형식(.bdb)이 아닙니다. 주석(.cdb) 파일은 지원하지 않습니다.");

    const baseName = file.name.replace(/\.(bdb|sdb)$/i, "");
    const id = "bdb:" + baseName;
    await BdbStore.save(id, baseName, buf);
    delete _sqlDbs[id]; // 재로드 대비 캐시 무효화
    await populateVersions();
    state.version = id;
    state.chapter = 1;
    $("#sel-version").value = id;
    savePos();
    statusEl.textContent = `✓ "${baseName}" 불러옴`;
    setTimeout(() => { statusEl.textContent = ""; }, 2500);
    showChapter();
  } catch (err) {
    statusEl.textContent = "✗ " + err.message;
  }
}

// ── 불러온 역본 관리 ──
async function openBdbManager() {
  const list = $("#bdb-list");
  list.innerHTML = "불러오는 중…";
  $("#bdb-overlay").classList.add("show");
  const items = await BdbStore.list();
  if (!items.length) { list.innerHTML = '<span style="color:var(--dim)">불러온 역본이 없습니다.</span>'; return; }
  list.innerHTML = items.map(u => `
    <div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line)">
      <span style="flex:1">📗 ${escapeHtml(u.name)}</span>
      <button class="ab-btn ab-clear" style="padding:5px 10px" onclick="removeBdb('${u.id.replace(/'/g,"\\'")}')">삭제</button>
    </div>`).join("");
}
function closeBdbManager() { $("#bdb-overlay").classList.remove("show"); }

async function removeBdb(id) {
  if (!confirm("이 역본을 삭제할까요? (기기에서만 제거)")) return;
  await BdbStore.remove(id);
  if (_sqlDbs[id]) { try { _sqlDbs[id].close(); } catch (e) {} delete _sqlDbs[id]; }
  if (state.version === id) { state.version = "ko_gae"; state.chapter = 1; savePos(); }
  await populateVersions();
  await openBdbManager();
  showChapter();
}

// ═══════════════════════════════════════════
// 시작
// ═══════════════════════════════════════════
(async function start() {
  restorePos();
  initSelectors();
  await populateVersions();
  // 복원한 버전이 목록에 없으면(삭제된 사용자 역본 등) 기본값으로
  if (![...$("#sel-version").options].some(o => o.value === state.version)) {
    state.version = "ko_gae";
  }
  $("#sel-version").value = state.version;
  showChapter();
})();
</script>
